<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Mind: Place Value Subtraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");

      * {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      body {
        font-family: "Fredoka", sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #fffaf0;
      }

      .game-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        position: relative;
        transition: max-width 0.4s ease;
      }

      #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* 3-Column Layout Animations */
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .slide-left {
        animation: slideInLeft 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .slide-right {
        animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      /* Full Tree Visualizer - EXPANDED & SPED UP */
      .tree-viewport {
        position: relative;
        width: 100%;
        height: 450px;
        display: flex;
        justify-content: center;
        margin-top: 10px;
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Faster */
      }

      .tree-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .node {
        position: absolute;
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Faster flying animation */
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .node-level-1 {
        font-size: 3.5rem;
        color: #374151;
        top: 0px;
      }
      .node-level-2 {
        font-size: 1.8rem;
        top: 85px;
        padding: 0.2rem 0.8rem;
        border-radius: 0.8rem;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 2px solid #f3f4f6;
      }
      .node-level-3 {
        font-size: 1.6rem;
        top: 170px;
        padding: 0.4rem 1rem;
        border-radius: 1.2rem;
        background: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      }
      .node-level-4 {
        font-size: 3.5rem;
        color: #10b981;
        top: 260px;
        text-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
      }

      .root-line {
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: growRoot 0.4s forwards ease-out; /* Faster */
        opacity: 0.7;
      }

      @keyframes growRoot {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* Step Area Animations */
      .step-area {
        width: 100%;
        min-height: 100px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .fade-slide-in {
        animation: fadeSlideIn 0.4s both;
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .next-btn {
        background: #10b981;
        color: white;
        border-bottom: 6px solid #059669;
        padding: 0.8rem 2.5rem;
        font-size: 1.8rem;
        font-weight: 900;
        border-radius: 1.5rem;
        transition: all 0.15s;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      }
      .next-btn:active {
        transform: translateY(3px) scale(0.95);
        border-bottom-width: 3px;
      }

      .vibrate {
        animation: vibrate 0.3s linear;
      }
      @keyframes vibrate {
        0%,
        100% {
          transform: translateX(-50%);
        } /* maintain centering */
        25% {
          transform: translateX(calc(-50% - 8px));
        }
        75% {
          transform: translateX(calc(-50% + 8px));
        }
      }

      .vibrate-btn {
        animation: vibrate-btn 0.3s linear;
      }
      @keyframes vibrate-btn {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      /* Interactive Equation Number Highlights */
      .interactive-num {
        color: #8b5cf6;
        cursor: pointer;
        display: inline-block;
        padding: 0.1rem 0.6rem;
        border-radius: 0.8rem;
        background: rgba(139, 92, 246, 0.1);
        border: 3px dashed #8b5cf6;
        transition:
          transform 0.15s ease,
          background 0.15s ease;
        z-index: 20;
      }
      .interactive-num:hover {
        background: rgba(139, 92, 246, 0.2);
        transform: scale(1.05) translateY(-1px);
      }
      .interactive-num:active {
        transform: scale(0.95) translateY(1px);
      }
      .interactive-num.pulse {
        animation: numPulse 2s infinite;
      }
      .interactive-num.active {
        background: rgba(139, 92, 246, 0.25);
        border-style: solid;
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.3);
        transform: scale(1.05);
      }
      @keyframes numPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(139, 92, 246, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
        }
      }

      .fast-transition {
        transition:
          transform 0.1s ease,
          background-color 0.1s ease,
          border-color 0.1s ease !important;
      }
    </style>
  </head>
  <body class="bg-orange-50">
    <div
      id="help-modal"
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden items-center justify-center p-6"
      onclick="toggleHelp(false)"
    >
      <div
        class="bg-white p-10 rounded-[3rem] max-w-lg w-full text-center shadow-2xl"
        onclick="event.stopPropagation()"
      >
        <h2 class="text-4xl font-black text-blue-600 mb-4">How to Play</h2>
        <div class="space-y-4 text-xl text-gray-600 font-medium">
          <p>
            1️⃣ Break numbers into
            <span class="text-blue-500 font-bold">Tens</span> and
            <span class="text-red-500 font-bold">Ones</span>.
          </p>
          <p>
            2️⃣ Subtract the
            <span class="text-blue-500 font-bold">Tens</span> together.
          </p>
          <p>
            3️⃣ Subtract the
            <span class="text-red-500 font-bold">Ones</span> together.
          </p>
          <p>4️⃣ Join those two results to get the Final Total!</p>
        </div>
        <button
          onclick="toggleHelp(false)"
          class="mt-8 w-full py-4 bg-blue-500 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform"
        >
          GOT IT!
        </button>
      </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="app" class="game-container max-w-2xl mx-auto w-full"></div>

    <script>
      // --- AUDIO SETUP ---
      const sfxSelect = new Audio("click.mp3");
      sfxSelect.volume = 0.9;

      const sfxCongrats = new Audio("congrats.mp3");
      sfxCongrats.volume = 0.9;

      const sfxWrong = new Audio("wrong.mp3");
      sfxWrong.volume = 0.9;

      const bgMusic = new Audio("bg_music.mp3");
      bgMusic.volume = 0.6;
      bgMusic.loop = true;

      function playSelect() {
        sfxSelect.currentTime = 0;
        sfxSelect.play().catch((e) => {});
      }
      function playCongrats() {
        sfxCongrats.currentTime = 0;
        sfxCongrats.play().catch((e) => {});
      }
      function playWrong() {
        sfxWrong.currentTime = 0;
        sfxWrong.play().catch((e) => {});
      }
      function ensureBGM() {
        if (bgMusic.paused) bgMusic.play().catch((e) => {});
      }

      let state = {
        view: "menu",
        step: 0,
        currentProblem: null,
        score: 0,
        isProcessing: false,
        wrongChoices: new Set(),
        decomp1: false,
        decomp2: false,
        activeDecomp: null,
        showOptions: false,
        mcqs: null,
        selectedMcqIdx: null,
      };

      const icons = {
        brain: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 4 4 0 0 0 5.327 2.022A3 3 0 1 0 12 18"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 4 4 0 0 1-5.327 2.022A3 3 0 1 1 12 18"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.5 9.912a2.5 2.5 0 0 0-5-1.912"/><path d="M6.5 9.912a2.5 2.5 0 0 1 5-1.912"/><path d="M12 18v-5"/></svg>`,
        star: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        help: `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>`,
      };

      function getRootEquation() {
        const p = state.currentProblem;
        const mode = state.view;

        if (p.isSimple || mode === "learn") return `${p.num1} - ${p.num2}`;

        const getPart = (num, isDecomp, idx) => {
          if (isDecomp) return `<span class='text-gray-800 px-2'>${num}</span>`;
          const isPulse = state.activeDecomp ? "" : "pulse";
          const isActive = state.activeDecomp === idx ? "active" : "";
          return `<span class='interactive-num ${isPulse} ${isActive}' onclick='window.revealOptions(${idx})'>${num}</span>`;
        };

        return `${getPart(p.num1, state.decomp1, 1)} - ${getPart(p.num2, state.decomp2, 2)}`;
      }

      window.revealOptions = function (idx) {
        if (state.isProcessing) return;
        if (state.step === 0 || state.step === 1) {
          playSelect();
          state.showOptions = true;
          state.activeDecomp = idx;
          renderStepContent();
        }
      };

      const formatAdd = (v1, v2) =>
        v2 < 0 ? `${v1} - ${Math.abs(v2)}` : `${v1} + ${v2}`;

      function getSplit(n) {
        const ones = n % 10;
        const tens = Math.floor(n / 10) * 10;
        return { tens: tens, ones: ones, display: `${tens} + ${ones}` };
      }

      // Logic to generate logical distractors for MCQs
      function generateMathOptions(correctVal, type) {
        let set = new Set([correctVal]);
        let offset = type === "tens" ? 10 : type === "ones" ? 1 : 5;

        while (set.size < 4) {
          let mod = Math.random() > 0.5 ? 1 : -1;
          let val =
            correctVal + mod * offset * (Math.floor(Math.random() * 3) + 1);
          if (type === "ones") {
            set.add(val);
          } else {
            if (val >= 0) set.add(val);
          }
        }
        return Array.from(set)
          .sort((a, b) => a - b)
          .map((v) => ({ text: v, correct: v === correctVal }));
      }

      function toggleHelp(show) {
        playSelect();
        document.getElementById("help-modal").style.display = show
          ? "flex"
          : "none";
      }

      function quitToMenu() {
        playSelect();
        state.view = "menu";
        state.score = 0;
        renderShell();
      }

      function generateProblem() {
        playSelect();
        ensureBGM();

        let n1, n2;
        while (true) {
          n1 = Math.floor(Math.random() * 60) + 30;
          n2 = Math.floor(Math.random() * (n1 - 15)) + 11;
          const o1 = n1 % 10;
          const o2 = n2 % 10;
          if (o1 !== 0 && o2 !== 0) break;
        }

        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getSplit(n1),
          s2: getSplit(n2),
          opts1: generateOptions(n1),
          opts2: generateOptions(n2),
          isSimple: n1 % 10 === n2 % 10,
          isN2Zero: n2 % 10 === 0,
        };

        state.step = 0;
        state.view = "practice";
        state.wrongChoices.clear();
        state.decomp1 = false;
        state.decomp2 = state.currentProblem.isN2Zero;
        state.mcqs = null;
        state.selectedMcqIdx = null;
        state.isProcessing = false;

        if (state.decomp2) {
          state.activeDecomp = 1;
          state.showOptions = true;
        } else {
          state.activeDecomp = null;
          state.showOptions = false;
        }
        renderShell();
      }

      function startLearn() {
        playSelect();
        ensureBGM();

        let n1, n2;
        while (true) {
          n1 = Math.floor(Math.random() * 60) + 30;
          n2 = Math.floor(Math.random() * (n1 - 15)) + 11;
          const o1 = n1 % 10;
          const o2 = n2 % 10;
          if (o1 !== 0 && o2 !== 0 && o1 < o2) break;
        }

        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getSplit(n1),
          s2: getSplit(n2),
          isSimple: false,
          isN2Zero: false,
        };
        state.step = 0;
        state.view = "learn";
        state.showOptions = false;
        state.mcqs = null;
        state.selectedMcqIdx = null;
        state.isProcessing = false;
        renderShell();
      }

      function nextLearnStep() {
        if (state.isProcessing) return;
        playSelect();
        state.isProcessing = true;

        setTimeout(() => {
          state.step++;
          state.isProcessing = false;
          renderStepContent();
        }, 300); // Faster learn stepping
      }

      function generateOptions(n) {
        const split = getSplit(n),
          tens = split.tens,
          ones = split.ones;
        let set = new Set([split.display]);

        const dists = [
          () => `${tens - 10} + ${ones + 10}`,
          () => `${tens + 10} - ${10 - ones}`,
          () =>
            `${tens + 5} ${ones > 5 ? "-" : "+"} ${Math.abs(ones - 5) || 2}`,
        ];
        dists.forEach((l) => {
          let c = l();
          if (set.has(c)) c = `${tens - 20} + ${ones + 20}`;
          set.add(c);
        });

        let f = 10;
        while (set.size < 4) {
          set.add(`${tens - f} + ${ones + f}`);
          f += 10;
        }

        return Array.from(set)
          .slice(0, 4)
          .map((t) => ({ t, c: t === split.display }))
          .sort(() => Math.random() - 0.5);
      }

      // Central Branching Node Choice Handler
      window.handleMcqChoice = function (idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        state.isProcessing = true; // Lock inputs immediately to prevent spam
        const btn = document.getElementById(btnId);
        const p = state.currentProblem;

        if (isCorrect) {
          playSelect();
          // Instant visual feedback
          btn.classList.remove("shadow-lg");
          btn.classList.add(
            "scale-95",
            "border-green-500",
            "bg-green-50",
            "fast-transition",
          );

          setTimeout(() => {
            state.score += 20;
            updateScoreDisplay();
            state.selectedMcqIdx = idx;

            // Render instantly to trigger the flying animation
            renderStepContent();

            setTimeout(() => {
              if (state.step === 2) {
                if (p.isN2Zero) {
                  state.step = 4;
                  state.mcqs = generateMathOptions(p.num1 - p.num2, "final");
                } else {
                  state.step = 3;
                  state.mcqs = generateMathOptions(
                    p.s1.ones - p.s2.ones,
                    "ones",
                  );
                }
              } else if (state.step === 3) {
                state.step = 4;
                state.mcqs = generateMathOptions(p.num1 - p.num2, "final");
              } else if (state.step === 4) {
                state.step = 5;
                state.mcqs = null;
                playCongrats();
                triggerConfetti();
              }
              state.selectedMcqIdx = null;
              state.isProcessing = false; // Unlock processing
              renderStepContent();
            }, 450); // Sped up animation transition match
          }, 100); // 100ms pause so user actually sees the button depress
        } else {
          playWrong();
          btn.classList.add(
            "vibrate",
            "border-red-500",
            "bg-red-50",
            "fast-transition",
          );
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(() => {
            btn.classList.remove(
              "vibrate",
              "border-red-500",
              "bg-red-50",
              "fast-transition",
            );
            state.isProcessing = false; // Unlock processing
          }, 300);
        }
      };

      window.handleOptionClick = function (idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        state.isProcessing = true; // Lock inputs
        const btn = document.getElementById(btnId);

        if (isCorrect) {
          playSelect();
          btn.classList.add(
            "scale-95",
            "border-green-500",
            "bg-green-50",
            "fast-transition",
          );

          setTimeout(() => {
            state.score += 20;
            updateScoreDisplay();

            if (state.activeDecomp === 1) state.decomp1 = true;
            if (state.activeDecomp === 2) state.decomp2 = true;

            if (state.decomp1 && !state.decomp2) {
              state.activeDecomp = 2;
              state.showOptions = true;
            } else if (!state.decomp1 && state.decomp2) {
              state.activeDecomp = 1;
              state.showOptions = true;
            } else {
              state.activeDecomp = null;
              state.showOptions = false;
            }

            renderStepContent();

            setTimeout(() => {
              if (state.decomp1 && state.decomp2) {
                state.step = 2;
                state.mcqs = generateMathOptions(
                  state.currentProblem.s1.tens - state.currentProblem.s2.tens,
                  "tens",
                );
              } else {
                state.step++;
              }
              state.isProcessing = false; // Unlock
              renderStepContent();
            }, 400); // Sped up wait
          }, 100); // Button press visible delay
        } else {
          playWrong();
          btn.classList.add(
            "vibrate-btn",
            "border-red-500",
            "bg-red-50",
            "fast-transition",
          );
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(() => {
            btn.classList.remove(
              "vibrate-btn",
              "border-red-500",
              "bg-red-50",
              "fast-transition",
            );
            state.isProcessing = false; // Unlock
          }, 300);
        }
      };

      window.handleSimpleChoice = function (isCorrect, btnId) {
        if (state.isProcessing) return;
        state.isProcessing = true;
        const btn = document.getElementById(btnId);

        if (isCorrect) {
          playSelect();
          btn.classList.add(
            "scale-95",
            "border-blue-500",
            "bg-blue-100",
            "fast-transition",
          );

          setTimeout(() => {
            playCongrats();
            triggerConfetti();
            state.step = 5;
            state.isProcessing = false;
            renderStepContent();
          }, 150);
        } else {
          playWrong();
          btn.classList.add(
            "vibrate-btn",
            "border-red-500",
            "bg-red-50",
            "fast-transition",
          );
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(() => {
            btn.classList.remove(
              "vibrate-btn",
              "border-red-500",
              "bg-red-50",
              "fast-transition",
            );
            state.isProcessing = false;
          }, 300);
        }
      };

      function updateScoreDisplay() {
        const scoreVal = document.getElementById("score-val");
        if (scoreVal) scoreVal.innerText = state.score;
      }

      function renderShell() {
        const app = document.getElementById("app");
        const mode = state.view;

        if (mode === "menu") {
          app.className = "game-container max-w-2xl mx-auto w-full";
          app.innerHTML = `<div class="flex flex-col items-center fade-in text-center">
                    <div class="mb-4 text-orange-600 drop-shadow-lg">${icons.brain}</div>
                    <h1 class="text-7xl font-black text-orange-800 mb-2 tracking-tight">Math Mind</h1>
                    <p class="text-3xl text-gray-400 mb-10 italic">Split & Subtract Method!</p>
                    <div class="flex flex-col gap-4 w-full max-w-sm">
                        <button onclick="startLearn()" class="p-8 bg-blue-500 border-b-8 border-blue-700 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-transform uppercase fast-transition">Learn Shortcut</button>
                        <button onclick="generateProblem()" class="p-8 bg-purple-600 border-b-8 border-purple-800 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-transform uppercase fast-transition">Play Game</button>
                    </div>
                </div>`;
          return;
        }

        app.className = "game-container max-w-[1400px] mx-auto w-full";
        app.innerHTML = `
            <div class="flex flex-row items-center justify-between w-full h-full gap-6 lg:gap-10">
                <div class="flex flex-col justify-center w-[200px] lg:w-[240px] shrink-0 slide-left" style="animation-delay: 0.1s">
                    <button onclick="quitToMenu()" class="bg-white text-gray-400 border-b-[8px] border-gray-200 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black active:scale-95 transition-transform w-full mb-6">QUIT</button>
                    <button onclick="toggleHelp(true)" class="bg-blue-500 text-white border-b-[8px] border-blue-700 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black active:scale-95 transition-transform flex items-center justify-center gap-3 w-full">
                        ${icons.help} HELP
                    </button>
                </div>

                <div id="game-card" class="w-full bg-white rounded-[4rem] shadow-2xl pt-4 pb-6 px-6 lg:px-8 relative flex-grow flex flex-col items-center border-b-[12px] border-orange-100 overflow-hidden h-[92vh] max-h-[900px] max-w-4xl z-10">
                    <div id="tree-area" class="w-full"></div>
                    <div id="step-area" class="step-area flex-grow"></div>
                </div>

                <div class="flex flex-col justify-start h-[92vh] max-h-[900px] w-[200px] lg:w-[240px] shrink-0 pt-8 slide-right" style="animation-delay: 0.2s">
                    <div style="visibility: ${mode === "learn" ? "hidden" : "visible"};" class="flex flex-col items-center bg-yellow-400 text-white rounded-[3rem] py-10 px-4 shadow-2xl border-b-[8px] border-yellow-600 w-full mt-4">
                        <div class="flex items-center gap-3 text-xl lg:text-2xl font-bold uppercase tracking-widest opacity-90 mb-4">
                            ${icons.star} Score
                        </div>
                        <div id="score-val" class="text-7xl lg:text-8xl font-black drop-shadow-md">${state.score}</div>
                    </div>
                </div>
            </div>
        `;
        renderStepContent();
      }

      function renderStepContent() {
        const stepArea = document.getElementById("step-area"),
          treeArea = document.getElementById("tree-area");
        if (!stepArea || !treeArea) return;
        const p = state.currentProblem;

        if (state.view === "learn") {
          renderTree(treeArea, p);
          renderLearnInstructions(stepArea, p);
        } else {
          renderPracticeGame(stepArea, treeArea, p);
        }
      }

      function renderTree(area, p) {
        const s = state.step;
        const v = state.view;

        const showSplit1 = v === "learn" ? s >= 1 : state.decomp1;
        const showSplit2 = v === "learn" ? s >= 2 : state.decomp2;
        const renderNormalTens = v === "learn" ? s >= 3 : s > 2;
        const renderNormalOnes = v === "learn" ? s >= 4 : s > 3;
        const renderNormalFinal = v === "learn" ? s >= 5 : s > 4;

        const tensDiff = p.s1.tens - p.s2.tens;
        const onesDiff = p.s1.ones - p.s2.ones;

        const LX1 = 20,
          AX1 = 38,
          LX2 = 62,
          AX2 = 80,
          LC = 42,
          AC = 58,
          FINAL = 50;

        let qString = "";
        if (state.step === 2) qString = `${p.s1.tens} - ${p.s2.tens}`;
        else if (state.step === 3) qString = `${p.s1.ones} - ${p.s2.ones}`;
        else if (state.step === 4)
          qString = p.isN2Zero
            ? formatAdd(tensDiff, p.s1.ones)
            : formatAdd(tensDiff, onesDiff);

        let html = `<div class="tree-viewport"><svg class="tree-svg">`;

        // Base Lines
        if (showSplit1)
          html += `<line x1="40%" y1="55" x2="${LX1}%" y2="95" class="root-line" style="stroke: #3b82f6;" /><line x1="40%" y1="55" x2="${AX1}%" y2="95" class="root-line" style="stroke: #ef4444;" />`;
        if (showSplit2)
          html += `<line x1="60%" y1="55" x2="${LX2}%" y2="95" class="root-line" style="stroke: #3b82f6;" /><line x1="60%" y1="55" x2="${AX2}%" y2="95" class="root-line" style="stroke: #ef4444;" />`;

        // Tens Convergence
        if (renderNormalTens || state.step === 2) {
          html += `<line x1="${LX1}%" y1="115" x2="${LC}%" y2="170" class="root-line" style="stroke: #2563eb;" />`;
          html += `<line x1="${LX2}%" y1="115" x2="${LC}%" y2="170" class="root-line" style="stroke: #2563eb;" />`;
        }

        // Ones Convergence
        if (renderNormalOnes || state.step === 3) {
          html += `<line x1="${AX1}%" y1="115" x2="${AC}%" y2="170" class="root-line" style="stroke: #dc2626;" />`;
          html += `<line x1="${AX2}%" y1="115" x2="${AC}%" y2="170" class="root-line" style="stroke: #dc2626;" />`;
        }

        // Final Convergence
        if ((renderNormalTens && renderNormalOnes) || state.step === 4) {
          html += `<line x1="${LC}%" y1="200" x2="${FINAL}%" y2="260" class="root-line" style="stroke: #10b981;" />`;
          html += `<line x1="${AC}%" y1="200" x2="${FINAL}%" y2="260" class="root-line" style="stroke: #10b981;" />`;
        }

        // Dashed lines to child options (sprouting from current target point)
        if (
          state.step >= 2 &&
          state.step <= 4 &&
          state.mcqs &&
          state.selectedMcqIdx === null &&
          v === "practice"
        ) {
          let originX, originY, spawnY, strokeColor;
          if (state.step === 2) {
            originX = LC;
            originY = 205;
            spawnY = 280;
            strokeColor = "#bfdbfe";
          } else if (state.step === 3) {
            originX = AC;
            originY = 205;
            spawnY = 280;
            strokeColor = "#fecaca";
          } else if (state.step === 4) {
            originX = FINAL;
            originY = 320;
            spawnY = 370;
            strokeColor = "#a7f3d0";
          }

          html += state.mcqs
            .map(
              (m, i) =>
                `<line x1="${originX}%" y1="${originY}" x2="${20 + i * 20}%" y2="${spawnY}" class="root-line" style="stroke: ${strokeColor}; stroke-width: 3; stroke-dasharray: 6 6;" />`,
            )
            .join("");
        }

        html += `</svg>`;
        html += `<div class="node node-level-1" style="left: 50%">${getRootEquation()}</div>`;

        // Render Base Nodes
        if (showSplit1) {
          html += `<div class="node node-level-2" style="left: ${LX1}%; color:#3b82f6">${p.s1.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX1}%; color:#ef4444">${p.s1.ones}</div>`;
        }
        if (showSplit2) {
          html += `<div class="node node-level-2" style="left: ${LX2}%; color:#3b82f6">${p.s2.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX2}%; color:#ef4444">${p.s2.ones}</div>`;
        }

        // Render Tens Node / Target
        if (renderNormalTens) {
          html += `<div class="node node-level-3" style="left: ${LC}%; color: #2563eb; border: 2px solid #bfdbfe;">${tensDiff}</div>`;
        } else if (
          state.step === 2 &&
          state.selectedMcqIdx === null &&
          v === "practice"
        ) {
          html += `<div class="node node-level-3 bg-blue-50 border-2 border-dashed border-blue-400 text-blue-600" style="left: ${LC}%; top: 170px;">${qString}</div>`;
        }

        // Render Ones Node / Target
        if (renderNormalOnes) {
          html += `<div class="node node-level-3" style="left: ${AC}%; color: #dc2626; border: 2px solid #fecaca;">${onesDiff}</div>`;
        } else if (
          state.step === 3 &&
          state.selectedMcqIdx === null &&
          v === "practice"
        ) {
          html += `<div class="node node-level-3 bg-red-50 border-2 border-dashed border-red-400 text-red-600" style="left: ${AC}%; top: 170px;">${qString}</div>`;
        }

        // Render Final Node / Target
        if (renderNormalFinal) {
          html += `<div class="node node-level-4" style="left: ${FINAL}%">${p.num1 - p.num2}</div>`;
        } else if (
          state.step === 4 &&
          state.selectedMcqIdx === null &&
          v === "practice"
        ) {
          html += `<div class="node node-level-4 bg-green-50 border-4 border-dashed border-green-400 text-green-600" style="left: ${FINAL}%; top: 260px; font-size: 2.8rem; padding: 0.5rem 1rem;">${qString}</div>`;
        }

        // Render Dynamic Flying MCQ Nodes
        if (
          state.step >= 2 &&
          state.step <= 4 &&
          state.mcqs &&
          v === "practice"
        ) {
          html += state.mcqs
            .map((m, i) => {
              let targetLeft, targetTop, optTop, colorClass, borderClass;
              if (state.step === 2) {
                targetLeft = LC;
                targetTop = 170;
                optTop = 280;
                colorClass = "text-blue-600";
                borderClass = "border-blue-200";
              } else if (state.step === 3) {
                targetLeft = AC;
                targetTop = 170;
                optTop = 280;
                colorClass = "text-red-600";
                borderClass = "border-red-200";
              } else if (state.step === 4) {
                targetLeft = FINAL;
                targetTop = 260;
                optTop = 370;
                colorClass = "text-green-600";
                borderClass = "border-green-200";
              }

              const isSelected = state.selectedMcqIdx === i;
              const isFaded = state.selectedMcqIdx !== null && !isSelected;
              const currentLeft = isSelected ? targetLeft : 20 + i * 20;
              const currentTop = isSelected ? targetTop : optTop;

              let btnClasses = `node cursor-pointer shadow-lg bg-white ${colorClass}`;
              if (!isFaded && state.selectedMcqIdx === null)
                btnClasses += " active:scale-95";

              if (state.step === 4 && isSelected) {
                btnClasses += " node-level-4";
              } else {
                btnClasses += ` node-level-3 border-2 ${borderClass}`;
              }

              return `<button id="mcq-${i}" onclick="handleMcqChoice(${i}, ${m.correct}, 'mcq-${i}')" 
                   class="${btnClasses}" 
                   style="left: ${currentLeft}%; top: ${currentTop}px; opacity: ${isFaded ? 0 : 1}; z-index: ${isSelected ? 30 : 20}; pointer-events: ${state.selectedMcqIdx !== null ? "none" : "auto"};">
                   ${m.text}
               </button>`;
            })
            .join("");
        }

        area.innerHTML = html + `</div>`;
      }

      function renderLearnInstructions(area, p) {
        const tensDiff = p.s1.tens - p.s2.tens;
        const onesDiff = p.s1.ones - p.s2.ones;
        const total = p.num1 - p.num2;

        const steps = [
          `Let's solve <span class='text-purple-600 font-bold'>${p.num1} - ${p.num2}</span>.`,
          `<span class='text-purple-600 font-bold'>${p.num1}</span> is made of <span class='text-blue-500 font-bold'>${p.s1.tens}</span> and <span class='text-red-500 font-bold'>${p.s1.ones}</span>.`,
          `Next, <span class='text-purple-600 font-bold'>${p.num2}</span> is made of <span class='text-blue-500 font-bold'>${p.s2.tens}</span> and <span class='text-red-500 font-bold'>${p.s2.ones}</span>.`,
          `First, subtract the Tens: <span class='text-blue-600 font-bold'>${p.s1.tens} - ${p.s2.tens} = ${tensDiff}</span>.`,
          `Next, subtract the Ones: <span class='text-red-600 font-bold'>${p.s1.ones} - ${p.s2.ones} = ${onesDiff}</span>.`,
          `Finally, join the results: <span class='text-green-600 font-bold'>${formatAdd(tensDiff, onesDiff)} = ${total}</span>.`,
          "",
        ];

        if (state.step < 6) {
          area.innerHTML = `<div class="flex flex-col items-center fade-slide-in mt-4">
                    <p class="text-2xl font-semibold text-gray-600 text-center mb-6 leading-tight">${steps[state.step]}</p>
                    <button onclick="nextLearnStep()" class="next-btn">NEXT</button>
                </div>`;
        } else {
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-4">
                    <div class="text-3xl font-black text-gray-500 mb-6 text-center uppercase tracking-widest">Lesson Complete</div>
                    <button onclick="startLearn()" class="w-full py-4 px-8 bg-green-500 text-white rounded-[2rem] font-black text-2xl shadow-xl mt-2 hover:scale-105 active:scale-95 transition-all">ANOTHER EXAMPLE</button>
                </div>`;
        }
      }

      function renderPracticeGame(area, tree, p) {
        renderTree(tree, p);

        if (p.isSimple) {
          if (state.step === 0) area.innerHTML = renderSimpleSolve(p);
          else {
            area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-6">
                        <div class="text-3xl font-black text-blue-500 tracking-widest uppercase mb-4 drop-shadow-sm">Bonus Cleared!</div>
                        <button onclick="generateProblem()" class="w-full py-5 bg-blue-500 text-white rounded-[2.5rem] font-black text-4xl shadow-xl active:scale-95 transition-transform">NEXT MISSION</button>
                    </div>`;
          }
          return;
        }

        if (state.step === 0 || state.step === 1) {
          area.innerHTML = renderDecomp();
        } else if (state.step >= 2 && state.step <= 4) {
          let promptText = "";
          let colorClass = "";
          if (state.step === 2) {
            promptText = "Subtract Tens";
            colorClass = "text-blue-500";
          }
          if (state.step === 3) {
            promptText = "Subtract Ones";
            colorClass = "text-red-500";
          }
          if (state.step === 4) {
            promptText = "Final Total";
            colorClass = "text-green-600";
          }

          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center py-6 fade-in">
                ${
                  state.isProcessing
                    ? `<div class="text-3xl font-bold ${colorClass} animate-pulse">Great!</div>`
                    : `<div class="text-2xl font-bold ${colorClass} uppercase tracking-widest animate-bounce"> ${promptText} </div>`
                }
            </div>`;
        } else {
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-6">
                    <div class="text-3xl font-black text-purple-500 tracking-widest uppercase mb-6 drop-shadow-sm">Mission Accomplished!</div>
                    <button onclick="generateProblem()" class="w-full py-5 bg-green-500 text-white rounded-[2.5rem] font-black text-4xl shadow-xl active:scale-95 transition-transform">NEXT MISSION</button>
                </div>`;
        }
      }

      function renderSimpleSolve(p) {
        const correctVal = p.num1 - p.num2;
        const mcqs = generateMathOptions(correctVal, "final");
        window.handleSimpleChoice = function (isCorrect, btnId) {
          if (state.isProcessing) return;
          state.isProcessing = true;
          const btn = document.getElementById(btnId);

          if (isCorrect) {
            playSelect();
            btn.classList.add(
              "scale-95",
              "border-blue-500",
              "bg-blue-100",
              "fast-transition",
            );
            setTimeout(() => {
              playCongrats();
              triggerConfetti();
              state.step = 5;
              state.isProcessing = false;
              renderStepContent();
            }, 150);
          } else {
            playWrong();
            btn.classList.add(
              "vibrate-btn",
              "border-red-500",
              "bg-red-50",
              "fast-transition",
            );
            if (!state.wrongChoices.has(btnId)) {
              state.score = Math.max(0, state.score - 5);
              state.wrongChoices.add(btnId);
              updateScoreDisplay();
            }
            setTimeout(() => {
              btn.classList.remove(
                "vibrate-btn",
                "border-red-500",
                "bg-red-50",
                "fast-transition",
              );
              state.isProcessing = false;
            }, 300);
          }
        };
        return `<div class="w-full flex flex-col items-center fade-in space-y-4 mt-6">
            <div class="w-full p-4 bg-blue-50 rounded-[3rem] border-4 border-blue-300 flex flex-col items-center shadow-md relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-blue-500 text-white px-6 py-1 rounded-bl-[1.5rem] font-black tracking-widest text-sm">BONUS!</div>
                <span class="text-xl font-black text-blue-700 mb-1 uppercase tracking-widest">Same Ones Digit!</span>
                <div class="text-6xl font-black text-blue-600 mb-4">${p.s1.tens} - ${p.s2.tens}</div>
                <div class="grid grid-cols-2 gap-3 w-full max-w-md">
                    ${mcqs.map((m, i) => `<button id="bonus-mcq-${i}" onclick="handleSimpleChoice(${m.correct}, 'bonus-mcq-${i}')" class="option-btn p-3 bg-white border-2 border-blue-100 rounded-[1.5rem] text-2xl font-black text-blue-700 active:scale-95 transition-transform">${m.text}</button>`).join("")}
                </div>
            </div>
        </div>`;
      }

      function renderDecomp() {
        const p = state.currentProblem;
        if (!state.showOptions) {
          const targetIdx = !state.decomp1 ? 1 : 2;
          return `<div class="w-full fade-in flex flex-col items-center justify-center py-6 mt-4">
                <div class="text-xl font-bold text-purple-500 animate-bounce flex items-center gap-3 bg-purple-50 px-6 py-3 rounded-full border-2 border-purple-200 shadow-sm cursor-pointer" onclick="window.revealOptions(${targetIdx})">
                    👉 Choose any number by clicking above.
                </div>
            </div>`;
        }
        const opts = state.activeDecomp === 1 ? p.opts1 : p.opts2;
        return `<div class="w-full fade-in flex flex-col items-center mt-2">
                <div class="grid grid-cols-2 gap-3 w-full max-w-md">
                    ${opts.map((o, i) => `<button id="opt-${i}" onclick="handleOptionClick(${i}, ${o.c}, 'opt-${i}')" class="option-btn p-3 bg-white border-2 border-purple-100 rounded-[1.5rem] text-2xl font-black text-purple-700 active:scale-95 transition-transform">${o.t}</button>`).join("")}
                </div>
            </div>`;
      }

      function triggerConfetti() {
        const cvs = document.getElementById("confetti-canvas"),
          ctx = cvs.getContext("2d");
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        const arr = [];
        for (let i = 0; i < 150; i++)
          arr.push({
            x: cvs.width / 2,
            y: cvs.height / 2,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 10,
            c: `hsl(${Math.random() * 360}, 70%, 50%)`,
            r: Math.random() * 8 + 4,
          });
        function anim() {
          ctx.clearRect(0, 0, cvs.width, cvs.height);
          arr.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.4;
            if (p.y > cvs.height) arr.splice(i, 1);
            ctx.fillStyle = p.c;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          });
          if (arr.length > 0) requestAnimationFrame(anim);
        }
        anim();
      }

      renderShell();
    </script>
  </body>
</html>
