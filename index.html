<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Mind: Landmark Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");

      body {
        font-family: "Fredoka", sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #fffaf0;
        touch-action: manipulation;
      }

      .game-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0.5rem;
        position: relative;
      }

      #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* Header Layout */
      .game-header {
        position: absolute;
        top: 1.5rem;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem;
        z-index: 50;
      }

      .header-group {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .header-btn {
        padding: 0.85rem 1.75rem;
        border-radius: 2rem;
        font-weight: 800;
        font-size: 1.4rem;
        box-shadow: 0 6px 12px -2px rgb(0 0 0 / 0.15);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .quit-btn {
        background: white;
        color: #9ca3af;
        border: 3px solid #f3f4f6;
      }
      .help-btn {
        background: #60a5fa;
        color: white;
        border-bottom: 5px solid #2563eb;
      }
      .score-box {
        background: #fbbf24;
        color: white;
        border-bottom: 5px solid #d97706;
      }

      /* Full Tree Visualizer */
      .tree-viewport {
        position: relative;
        width: 100%;
        height: 400px;
        display: flex;
        justify-content: center;
        margin-top: 1rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .tree-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .node {
        position: absolute;
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .node-level-1 {
        font-size: 3rem;
        color: #374151;
        top: 10px;
      }
      .node-level-2 {
        font-size: 2rem;
        top: 115px;
        padding: 0.25rem 1rem;
        border-radius: 1rem;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 2px solid #f3f4f6;
      }
      .node-level-3 {
        font-size: 1.8rem;
        top: 225px;
        padding: 0.5rem 1.25rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      }
      .node-level-4 {
        font-size: 3.5rem;
        color: #10b981;
        top: 315px;
        text-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
      }

      .root-line {
        stroke: #d1d5db;
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: growRoot 0.8s forwards ease-out;
        opacity: 0.6;
      }

      @keyframes growRoot {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* Step Area Animations */
      .step-area {
        width: 100%;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .fade-slide-in {
        animation: fadeSlideIn 0.5s both;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .next-btn {
        background: #10b981;
        color: white;
        border-bottom: 6px solid #059669;
        padding: 1rem 3.5rem;
        font-size: 2.2rem;
        font-weight: 900;
        border-radius: 2rem;
        transition: all 0.2s;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      }
      .next-btn:active {
        transform: translateY(3px);
        border-bottom-width: 3px;
      }

      /* Shared Components */
      .focus-zone {
        background: radial-gradient(
          circle,
          rgba(216, 180, 254, 0.2) 0%,
          rgba(255, 255, 255, 0) 70%
        );
        padding: 0.75rem;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: focus-pulse 2s infinite ease-in-out;
      }
      @keyframes focus-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }

      .target-num {
        font-size: 5rem;
        font-weight: 900;
        color: #9333ea;
        text-shadow: 0 4px 15px rgba(147, 51, 234, 0.25);
      }
      .option-btn {
        transition: all 0.2s;
        box-shadow: 0 4px 0 rgba(147, 51, 234, 0.1);
      }
      .vibrate {
        animation: vibrate 0.3s linear;
      }
      @keyframes vibrate {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
        100% {
          transform: translateX(0);
        }
      }

      /* Practice History */
      .sum-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        min-height: 100px;
        justify-content: flex-end;
        margin-bottom: 0.15rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .history-item {
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 700;
        color: #9ca3af;
        font-size: 1rem;
        opacity: 0;
        transform: translateY(15px) scale(0.8);
        margin-bottom: 4px;
      }

      .history-item.show {
        opacity: 0.5;
        transform: translateY(0) scale(0.9);
      }
      .finished .sum-stack {
        justify-content: center;
        min-height: 280px;
        margin-top: 1rem;
      }
      .finished .history-item {
        opacity: 1 !important;
        color: #10b981 !important;
        font-size: 1.8rem !important;
        transform: scale(1.15) !important;
        margin-bottom: 12px;
      }

      /* Sliding Active Sum */
      .active-container {
        position: relative;
        height: 60px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.5rem;
        transition: opacity 0.4s ease;
      }
      .finished .active-container {
        opacity: 0;
        height: 0;
        margin: 0;
      }

      .sum-text {
        position: absolute;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 900;
        font-size: 2.5rem;
        white-space: nowrap;
      }
      .sum-up {
        transform: translateY(-50px) scale(0.4);
        opacity: 0;
      }
      .sum-center {
        transform: translateY(0) scale(1);
        opacity: 1;
        color: #374151;
      }
      .sum-down {
        transform: translateY(40px) scale(0.8);
        opacity: 0;
      }
    </style>
  </head>
  <body class="bg-orange-50">
    <div
      id="help-modal"
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden items-center justify-center p-6"
      onclick="toggleHelp(false)"
    >
      <div
        class="bg-white p-10 rounded-[3rem] max-w-lg w-full text-center shadow-2xl"
        onclick="event.stopPropagation()"
      >
        <h2 class="text-4xl font-black text-blue-600 mb-4">How to Play</h2>
        <div class="space-y-4 text-xl text-gray-600 font-medium">
          <p>
            1️⃣ Use
            <span class="text-purple-600 font-bold">Landmarks</span> (ending in
            0 or 5).
          </p>
          <p>
            2️⃣ Round <span class="text-green-600 font-bold">UP</span> if the
            last digit is <span class="underline">6, 7, 8, or 9</span>.
          </p>
          <p>
            3️⃣ Solve the
            <span class="text-blue-500 font-bold">Big Parts</span> first!
          </p>
        </div>
        <button
          onclick="toggleHelp(false)"
          class="mt-8 w-full py-4 bg-blue-500 text-white rounded-2xl font-black text-xl shadow-lg"
        >
          GOT IT!
        </button>
      </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <div id="app" class="game-container max-w-2xl mx-auto w-full"></div>

    <script>
      let state = {
        view: "menu",
        step: 0,
        currentProblem: null,
        score: 0,
        isProcessing: false,
        activeSum: "",
        history: [],
        wrongChoices: new Set(),
      };

      const icons = {
        brain: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 4 4 0 0 0 5.327 2.022A3 3 0 1 0 12 18"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 4 4 0 0 1-5.327 2.022A3 3 0 1 1 12 18"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.5 9.912a2.5 2.5 0 0 0-5-1.912"/><path d="M6.5 9.912a2.5 2.5 0 0 1 5-1.912"/><path d="M12 18v-5"/></svg>`,
        star: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        help: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>`,
      };

      const resolveDisplay = (v1, v2) =>
        v2 < 0 ? `${v1} + ${Math.abs(v2)}` : `${v1} - ${v2}`;

      function getTeacherSplit(n) {
        const ones = n % 10,
          tens = Math.floor(n / 10) * 10;
        if (ones > 5)
          return {
            landmark: tens + 10,
            extra: -(10 - ones),
            display: `${tens + 10} - ${10 - ones}`,
          };
        return { landmark: tens, extra: ones, display: `${tens} + ${ones}` };
      }

      function toggleHelp(show) {
        document.getElementById("help-modal").style.display = show
          ? "flex"
          : "none";
      }

      function generateProblem() {
        let n1 = Math.floor(Math.random() * 60) + 30,
          n2 = Math.floor(Math.random() * (n1 - 15)) + 11;
        const s1 = getTeacherSplit(n1),
          s2 = getTeacherSplit(n2);
        if (s1.extra < s2.extra && s1.extra >= 0 && s2.extra >= 0)
          n1 += s2.extra - s1.extra;
        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getTeacherSplit(n1),
          s2: getTeacherSplit(n2),
          opts1: generateGenuineOptions(n1),
          opts2: generateGenuineOptions(n2),
        };
        state.step = 0;
        state.view = "practice";
        state.history = [];
        state.wrongChoices.clear();
        renderShell();
      }

      function startLearn() {
        const n1 = 87,
          n2 = 26;
        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getTeacherSplit(n1),
          s2: getTeacherSplit(n2),
        };
        state.step = 0;
        state.view = "learn";
        state.history = [];
        renderShell();
      }

      function nextLearnStep() {
        if (state.isProcessing) return;
        state.isProcessing = true;
        setTimeout(() => {
          state.step++;
          state.isProcessing = false;
          if (state.step === 6) {
            triggerConfetti();
            state.score += 20;
          }
          renderStepContent();
        }, 500);
      }

      function generateGenuineOptions(n) {
        const teacher = getTeacherSplit(n),
          tens = Math.floor(n / 10) * 10,
          ones = n % 10;
        let set = new Set([teacher.display]);
        const dists = [
          () =>
            ones > 5 ? `${tens} + ${ones}` : `${tens + 10} - ${10 - ones}`,
          () => `${tens + 5} ${ones > 5 ? "-" : "+"} ${Math.abs(ones - 5)}`,
          () => `${tens - 10} + ${ones + 10}`,
        ];
        dists.forEach((l) => {
          let c = l();
          if (set.has(c)) c = `${tens - 20} + ${ones + 20}`;
          set.add(c);
        });
        return Array.from(set)
          .slice(0, 4)
          .map((t) => ({ t, c: t === teacher.display }))
          .sort(() => Math.random() - 0.5);
      }

      function handleOptionClick(idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        const btn = document.getElementById(btnId);
        if (isCorrect) {
          state.isProcessing = true;
          btn.classList.add(
            "border-green-500",
            "bg-green-50",
            "ring-4",
            "ring-green-100",
          );
          state.history.push(
            `Step ${state.step + 1}: ${state.currentProblem.num1} broken down`,
          );
          setTimeout(() => {
            state.step++;
            state.isProcessing = false;
            renderStepContent();
          }, 800);
        } else {
          btn.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            document.getElementById("score-val").innerText = state.score;
          }
          setTimeout(
            () =>
              btn.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function checkInput(id, expected) {
        if (state.isProcessing) return;
        const input = document.getElementById(id),
          val = parseInt(input.value);
        if (val === expected) {
          state.isProcessing = true;
          input.classList.add("border-green-500", "bg-green-50");
          state.history.push(
            state.step === 2 ? "Landmarks solved" : "Adjustments solved",
          );
          setTimeout(() => {
            state.step++;
            state.isProcessing = false;
            if (state.step === 5) {
              state.score += 20;
              document.getElementById("score-val").innerText = state.score;
              triggerConfetti();
            }
            renderStepContent();
          }, 800);
        } else {
          input.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(id)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(id);
            document.getElementById("score-val").innerText = state.score;
          }
          setTimeout(
            () =>
              input.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function renderShell() {
        const app = document.getElementById("app");
        if (state.view === "menu") {
          app.innerHTML = `<div class="flex flex-col items-center fade-in text-center">
                    <div class="mb-4 text-orange-600 drop-shadow-lg">${icons.brain}</div>
                    <h1 class="text-7xl font-black text-orange-800 mb-2 tracking-tight">Math Mind</h1>
                    <p class="text-3xl text-gray-400 mb-10 italic">Learn to Think in Landmarks!</p>
                    <div class="flex flex-col gap-4 w-full max-w-sm">
                        <button onclick="startLearn()" class="p-8 bg-blue-500 border-b-8 border-blue-700 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Learn Shortcut</button>
                        <button onclick="generateProblem()" class="p-8 bg-purple-600 border-b-8 border-purple-800 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Play Game</button>
                    </div>
                </div>`;
          return;
        }
        app.innerHTML = `
                <div class="game-header">
                    <div class="header-group">
                        <button onclick="state.view='menu'; state.score=0; renderShell()" class="header-btn quit-btn">QUIT</button>
                        <button onclick="toggleHelp(true)" class="header-btn help-btn">${icons.help} HELP</button>
                    </div>
                    <div class="header-btn score-box">${icons.star} SCORE: <span id="score-val">${state.score}</span></div>
                </div>
                <div id="game-card" class="w-full bg-white rounded-[5rem] shadow-2xl p-6 relative flex-grow flex flex-col items-center border-b-[10px] border-orange-100 overflow-hidden max-h-[92vh]">
                    <div id="stack-area" class="sum-stack ${state.view === "learn" ? "hidden" : ""}"></div>
                    <div id="active-container" class="active-container ${state.view === "learn" ? "hidden" : ""}"></div>
                    <div id="tree-area" class="w-full"></div>
                    <div id="step-area" class="step-area"></div>
                </div>`;
        renderStepContent();
      }

      function renderStepContent() {
        const stepArea = document.getElementById("step-area"),
          treeArea = document.getElementById("tree-area");
        if (!stepArea || !treeArea) return;
        const p = state.currentProblem;

        if (state.view === "learn") {
          renderLearnTree(treeArea, p);
          renderLearnInstructions(stepArea, p);
        } else {
          renderPracticeGame(stepArea, treeArea, p);
        }
      }

      function renderLearnTree(area, p) {
        const s = state.step;
        const lA = p.s1.landmark - p.s2.landmark,
          eA = p.s1.extra - p.s2.extra;

        // X-coordinates for organized symmetry
        const LX1 = 20,
          AX1 = 38,
          LX2 = 62,
          AX2 = 80;
        const LC = 42,
          AC = 58,
          FINAL = 50;

        let html = `<div class="tree-viewport">
                <svg class="tree-svg">
                    <!-- Decomposition Roots -->
                    ${s >= 1 ? `<line x1="40%" y1="55" x2="${LX1}%" y2="115" class="root-line" /><line x1="40%" y1="55" x2="${AX1}%" y2="115" class="root-line" />` : ""}
                    ${s >= 2 ? `<line x1="60%" y1="55" x2="${LX2}%" y2="115" class="root-line" /><line x1="60%" y1="55" x2="${AX2}%" y2="115" class="root-line" />` : ""}
                    <!-- Calculation Roots -->
                    ${s >= 3 ? `<line x1="${LX1}%" y1="140" x2="${LC}%" y2="225" class="root-line" /><line x1="${LX2}%" y1="140" x2="${LC}%" y2="225" class="root-line" />` : ""}
                    ${s >= 4 ? `<line x1="${AX1}%" y1="140" x2="${AC}%" y2="225" class="root-line" /><line x1="${AX2}%" y1="140" x2="${AC}%" y2="225" class="root-line" />` : ""}
                    <!-- Final Converge -->
                    ${s >= 5 ? `<line x1="${LC}%" y1="265" x2="${FINAL}%" y2="315" class="root-line" /><line x1="${AC}%" y1="265" x2="${FINAL}%" y2="315" class="root-line" />` : ""}
                </svg>`;

        html += `<div class="node node-level-1" style="left: 50%">${p.num1} - ${p.num2}</div>`;

        if (s >= 1) {
          html += `<div class="node node-level-2" style="left: ${LX1}%; color:#3b82f6">${p.s1.landmark}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX1}%; color:#f43f5e">${p.s1.extra}</div>`;
        }
        if (s >= 2) {
          html += `<div class="node node-level-2" style="left: ${LX2}%; color:#3b82f6">${p.s2.landmark}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX2}%; color:#f43f5e">${p.s2.extra}</div>`;
        }
        if (s >= 3)
          html += `<div class="node node-level-3" style="left: ${LC}%; color: #2563eb; border: 2px solid #bfdbfe;">${lA}</div>`;
        if (s >= 4)
          html += `<div class="node node-level-3" style="left: ${AC}%; color: #dc2626; border: 2px solid #fecaca;">${eA}</div>`;
        if (s >= 5)
          html += `<div class="node node-level-4" style="left: ${FINAL}%">${p.num1 - p.num2}</div>`;

        area.innerHTML = html + `</div>`;
      }

      function renderLearnInstructions(area, p) {
        const steps = [
          "Let's solve <span class='text-purple-600 font-bold'>87 - 26</span>. Watch how the hidden parts split apart!",
          "<span class='text-purple-600 font-bold'>87</span> is close to 90. So we split it into <span class='text-blue-500'>90</span> and <span class='text-red-500'>-3</span>.",
          "Next, <span class='text-purple-600 font-bold'>26</span> is close to 30. Split it into <span class='text-blue-500'>30</span> and <span class='text-red-500'>-4</span>.",
          "Now we subtract the Big Landmarks: <span class='text-blue-600 font-bold'>90 - 30 = 60</span>.",
          "Then the Small Adjustments: <span class='text-red-600 font-bold'>-3 - (-4) = 1</span>.",
          "Finally, join the results: <span class='text-green-600 font-bold'>60 + 1 = 61</span>. You did it!",
          "",
        ];

        if (state.step < 6) {
          area.innerHTML = `<div class="flex flex-col items-center fade-slide-in">
                    <p class="text-2xl font-semibold text-gray-600 text-center mb-6 leading-tight">${steps[state.step]}</p>
                    <button onclick="nextLearnStep()" class="next-btn">${state.step === 5 ? "FINISH" : "NEXT"}</button>
                </div>`;
        } else {
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in">
                    <div class="congrats-text text-green-500">SHORTCUT MASTERED!</div>
                    <button onclick="state.view='menu'; renderShell()" class="w-full py-7 bg-blue-500 text-white rounded-[2.5rem] font-black text-4xl shadow-xl mt-8 hover:scale-105 active:scale-95 transition-all">MAIN MENU</button>
                </div>`;
        }
      }

      function renderPracticeGame(area, tree, p) {
        tree.innerHTML = ""; // Hide tree in practice
        const stack = state.history
          .map((txt) => `<div class="history-item show">${txt}</div>`)
          .join("");
        document.getElementById("stack-area").innerHTML = stack;
        document.getElementById("active-container").innerHTML =
          `<div class="sum-text sum-center">${state.activeSum || p.num1 + " - " + p.num2}</div>`;

        if (state.step === 0) area.innerHTML = renderDecomp(p.num1, p.opts1);
        else if (state.step === 1)
          area.innerHTML = renderDecomp(p.num2, p.opts2);
        else if (state.step < 5) area.innerHTML = renderSolve(p);
        else {
          document.getElementById("game-card").classList.add("finished");
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in">
                    <div class="congrats-text">CONGRATULATIONS!</div>
                    <div class="step-math-highlight text-5xl font-black text-purple-600 mt-2">RESULT: ${p.num1 - p.num2}</div>
                    <button onclick="generateProblem()" class="w-full py-7 bg-green-500 text-white rounded-[2.5rem] font-black text-4xl shadow-xl mt-10 hover:scale-105 active:scale-95 transition-all">NEXT MISSION</button>
                </div>`;
        }
      }

      function renderDecomp(num, opts) {
        return `<div class="w-full fade-in flex flex-col items-center">
                <div class="focus-zone mb-4"><span class="target-num">${num}</span></div>
                <div class="grid grid-cols-2 gap-4 w-full">
                    ${opts.map((o, i) => `<button id="opt-${i}" onclick="handleOptionClick(${i}, ${o.c}, 'opt-${i}')" class="option-btn p-5 bg-white border-2 border-purple-100 rounded-[2.5rem] text-3xl font-black text-purple-700 hover:border-purple-300 active:scale-95 transition-all">${o.t}</button>`).join("")}
                </div>
            </div>`;
      }

      function renderSolve(p) {
        const lA = p.s1.landmark - p.s2.landmark,
          eA = p.s1.extra - p.s2.extra,
          total = p.num1 - p.num2;
        let html = `<div class="w-full flex flex-col items-center fade-in space-y-6">`;
        if (state.step === 2) {
          html += `<div class="w-full p-6 bg-blue-50 rounded-[3rem] border-2 border-blue-100 flex flex-col items-center fade-in">
                    <span class="step-label text-blue-500">3. Subtract Landmarks</span>
                    <div class="step-math-highlight text-blue-600">${p.s1.landmark} - ${p.s2.landmark}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="l_in" type="number" autofocus placeholder="?" class="w-36 text-center text-5xl font-black bg-white rounded-3xl p-3 border-4 border-blue-400 focus:outline-none">
                        <button onclick="checkInput('l_in', ${lA})" class="bg-blue-600 text-white px-10 py-4 rounded-3xl font-bold text-2xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 3) {
          html += `<div class="w-full p-6 bg-green-50 rounded-[3rem] border-2 border-green-100 flex flex-col items-center fade-in">
                    <span class="step-label text-green-500">4. Adjustments</span>
                    <div class="step-math-highlight text-green-600">${resolveDisplay(p.s1.extra, p.s2.extra)}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="e_in" type="number" autofocus placeholder="?" class="w-36 text-center text-5xl font-black bg-white rounded-3xl p-3 border-4 border-green-400 focus:outline-none">
                        <button onclick="checkInput('e_in', ${eA})" class="bg-green-600 text-white px-10 py-4 rounded-3xl font-bold text-2xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 4) {
          html += `<div class="w-full p-8 bg-yellow-50 rounded-[4rem] border-4 border-yellow-300 flex flex-col items-center shadow-md fade-in">
                    <span class="step-label text-yellow-700">Final Total</span>
                    <div class="text-5xl font-black text-yellow-600 mb-4">${resolveDisplay(lA, eA)}</div>
                    <div class="flex gap-4">
                        <input id="f_in" type="number" autofocus placeholder="?" class="w-48 text-center text-6xl font-black bg-white rounded-[2rem] p-4 border-4 border-yellow-500 focus:outline-none">
                        <button onclick="checkInput('f_in', ${total})" class="bg-yellow-500 text-white px-12 py-6 rounded-[2rem] font-black text-3xl shadow-xl active:scale-95 transition-all">CHECK</button>
                    </div></div>`;
        }
        return html + `</div>`;
      }

      const confettiArr = [];
      function triggerConfetti() {
        const cvs = document.getElementById("confetti-canvas"),
          ctx = cvs.getContext("2d");
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        for (let i = 0; i < 200; i++)
          confettiArr.push({
            x: cvs.width / 2,
            y: cvs.height / 2,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 15,
            c: `hsl(${Math.random() * 360}, 75%, 60%)`,
            r: Math.random() * 10 + 5,
          });
        function anim() {
          ctx.clearRect(0, 0, cvs.width, cvs.height);
          confettiArr.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5;
            p.vx *= 0.97;
            ctx.fillStyle = p.c;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            if (p.y > cvs.height) confettiArr.splice(i, 1);
          });
          if (confettiArr.length > 0) requestAnimationFrame(anim);
        }
        anim();
      }

      renderShell();
    </script>
  </body>
</html>
