<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Mind: Celebration Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");

      body {
        font-family: "Fredoka", sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #fffaf0;
        touch-action: manipulation;
      }

      .game-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0.5rem;
        position: relative;
      }

      #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* Large Header Layout */
      .game-header {
        position: absolute;
        top: 1rem;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 1.5rem;
        z-index: 50;
      }

      .header-btn {
        padding: 0.75rem 1.5rem;
        border-radius: 1.5rem;
        font-weight: 800;
        font-size: 1.25rem;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        transition: all 0.2s;
      }

      .quit-btn {
        background: white;
        color: #9ca3af;
        border: 2px solid #f3f4f6;
      }
      .score-box {
        background: #fbbf24;
        color: white;
        border-bottom: 4px solid #d97706;
      }

      /* Stacked History */
      .sum-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        min-height: 100px;
        justify-content: flex-end;
        margin-bottom: 0.25rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .history-item {
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 700;
        color: #9ca3af;
        font-size: 1rem;
        opacity: 0;
        transform: translateY(15px) scale(0.8);
        margin-bottom: 4px;
      }

      .history-item.show {
        opacity: 0.5;
        transform: translateY(0) scale(0.9);
      }

      /* Final Glide & Grow Animation */
      .finished .sum-stack {
        justify-content: center;
        min-height: 260px;
        margin-top: 1rem;
      }

      .finished .history-item {
        opacity: 1 !important;
        color: #10b981 !important;
        font-size: 1.75rem !important;
        transform: scale(1.15) !important;
        margin-bottom: 10px;
      }

      /* Sliding Active Sum */
      .active-container {
        position: relative;
        height: 60px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.5rem;
        transition: opacity 0.4s ease;
      }

      .finished .active-container {
        opacity: 0;
        height: 0;
        margin: 0;
      }

      .sum-text {
        position: absolute;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 900;
        font-size: 2.5rem;
        white-space: nowrap;
      }

      .sum-up {
        transform: translateY(-50px) scale(0.4);
        opacity: 0;
      }
      .sum-center {
        transform: translateY(0) scale(1);
        opacity: 1;
        color: #374151;
      }
      .sum-down {
        transform: translateY(40px) scale(0.8);
        opacity: 0;
      }

      .focus-zone {
        background: radial-gradient(
          circle,
          rgba(216, 180, 254, 0.2) 0%,
          rgba(255, 255, 255, 0) 70%
        );
        padding: 0.75rem;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: focus-pulse 2s infinite ease-in-out;
      }

      @keyframes focus-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      .target-num {
        font-size: 5rem;
        line-height: 1;
        font-weight: 900;
        color: #9333ea;
        text-shadow: 0 4px 15px rgba(147, 51, 234, 0.25);
      }

      .step-area {
        width: 100%;
        min-height: 220px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .vibrate {
        animation: vibrate 0.3s linear;
      }
      @keyframes vibrate {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px) rotate(-1deg);
        }
        75% {
          transform: translateX(8px) rotate(1deg);
        }
        100% {
          transform: translateX(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .option-btn {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 0 rgba(147, 51, 234, 0.1);
      }

      .option-btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(147, 51, 234, 0.1);
      }

      .congrats-text {
        font-size: 2.5rem;
        font-weight: 900;
        color: #9333ea;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 1rem;
        animation: popBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes popBounce {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        70% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="bg-orange-50">
    <canvas id="confetti-canvas"></canvas>

    <div id="app" class="game-container max-w-2xl mx-auto w-full"></div>

    <script>
      let state = {
        view: "menu",
        step: 0,
        currentProblem: null,
        score: 0,
        isProcessing: false,
        activeSum: "",
        history: [],
        wrongChoices: new Set(), // Track penalties per step
      };

      const icons = {
        brain: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 4 4 0 0 0 5.327 2.022A3 3 0 1 0 12 18"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 4 4 0 0 1-5.327 2.022A3 3 0 1 1 12 18"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.5 9.912a2.5 2.5 0 0 0-5-1.912"/><path d="M6.5 9.912a2.5 2.5 0 0 1 5-1.912"/><path d="M12 18v-5"/></svg>`,
        star: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      };

      const resolveDisplay = (v1, v2, sym = "-") =>
        v2 < 0 ? `${v1} + ${Math.abs(v2)}` : `${v1} ${sym} ${v2}`;

      function getTeacherSplit(n) {
        const ones = n % 10;
        const tens = Math.floor(n / 10) * 10;
        // Rule: Round up ONLY if ones > 5 (6,7,8,9). 85 stays 80+5.
        if (ones > 5)
          return {
            landmark: tens + 10,
            extra: -(10 - ones),
            display: `${tens + 10} - ${10 - ones}`,
          };
        return { landmark: tens, extra: ones, display: `${tens} + ${ones}` };
      }

      function generateGenuineOptions(n) {
        const teacher = getTeacherSplit(n);
        const tens = Math.floor(n / 10) * 10;
        const ones = n % 10;
        let set = new Set([teacher.display]);
        const dists = [
          () =>
            ones > 5 ? `${tens} + ${ones}` : `${tens + 10} - ${10 - ones}`,
          () => `${tens + 5} ${ones > 5 ? "-" : "+"} ${Math.abs(ones - 5)}`,
          () => `${tens - 10} + ${ones + 10}`,
          () => `${tens + 20} - ${20 - ones}`,
        ];
        dists.forEach((l) => {
          let c = l();
          if (set.has(c)) c = `${tens - 20} + ${ones + 20}`;
          set.add(c);
        });
        return Array.from(set)
          .slice(0, 4)
          .map((t) => ({ t, c: t === teacher.display }))
          .sort(() => Math.random() - 0.5);
      }

      function triggerEvolution(newSum) {
        const container = document.getElementById("active-container");
        if (!container) return;
        const current = container.querySelector(".sum-center");
        if (current) {
          current.classList.replace("sum-center", "sum-up");
          setTimeout(() => current.remove(), 600);
        }
        const inc = document.createElement("div");
        inc.className = "sum-text sum-down";
        inc.innerText = newSum;
        container.appendChild(inc);
        requestAnimationFrame(() =>
          inc.classList.replace("sum-down", "sum-center"),
        );
        state.activeSum = newSum;
      }

      function generateProblem() {
        let n1 = Math.floor(Math.random() * 60) + 30;
        let n2 = Math.floor(Math.random() * (n1 - 15)) + 11;
        const s1 = getTeacherSplit(n1),
          s2 = getTeacherSplit(n2);
        if (s1.extra < s2.extra && s1.extra >= 0 && s2.extra >= 0)
          n1 += s2.extra - s1.extra;
        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getTeacherSplit(n1),
          s2: getTeacherSplit(n2),
          opts1: generateGenuineOptions(n1),
          opts2: generateGenuineOptions(n2),
        };
        state.step = 0;
        state.view = "practice";
        state.history = [];
        state.wrongChoices.clear();
        renderShell();
        triggerEvolution(`${n1} - ${n2}`);
      }

      function handleOptionClick(idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        const btn = document.getElementById(btnId);
        if (isCorrect) {
          state.isProcessing = true;
          btn.classList.add(
            "border-green-500",
            "bg-green-50",
            "ring-4",
            "ring-green-100",
          );
          state.history.push(`Step ${state.step + 1}: ${state.activeSum}`);
          updateHistoryStack();
          triggerEvolution(
            state.step === 0
              ? `(${state.currentProblem.s1.display}) - ${state.currentProblem.num2}`
              : `(${state.currentProblem.s1.display}) - (${state.currentProblem.s2.display})`,
          );
          setTimeout(() => {
            state.step++;
            state.isProcessing = false;
            state.wrongChoices.clear();
            renderStepContent();
          }, 800);
        } else {
          btn.classList.add("border-red-500", "bg-red-50", "vibrate");
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(
            () =>
              btn.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function checkInput(id, expected) {
        if (state.isProcessing) return;
        const input = document.getElementById(id);
        const val = parseInt(input.value);
        const p = state.currentProblem;
        if (val === expected) {
          state.isProcessing = true;
          input.classList.add("border-green-500", "bg-green-50");
          let summary =
            state.step === 2
              ? `Step 3: ${p.s1.landmark} - ${p.s2.landmark} = ${p.s1.landmark - p.s2.landmark}`
              : `Step 4: ${resolveDisplay(p.s1.extra, p.s2.extra)} = ${p.s1.extra - p.s2.extra}`;
          state.history.push(summary);
          updateHistoryStack();
          triggerEvolution(
            state.step === 2
              ? `${p.s1.landmark - p.s2.landmark} + (${resolveDisplay(p.s1.extra, p.s2.extra)})`
              : `${p.num1 - p.num2}`,
          );
          setTimeout(() => {
            state.step++;
            state.isProcessing = false;
            state.wrongChoices.clear();
            if (state.step === 5) {
              state.score += 20;
              updateScoreDisplay();
              triggerConfetti();
            }
            renderStepContent();
          }, 800);
        } else {
          input.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(id)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(id);
            updateScoreDisplay();
          }
          setTimeout(
            () =>
              input.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function updateHistoryStack() {
        const stack = document.getElementById("stack-area");
        if (!stack) return;
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerText = state.history[state.history.length - 1];
        stack.appendChild(item);
        requestAnimationFrame(() => item.classList.add("show"));
      }

      function updateScoreDisplay() {
        const scoreEl = document.getElementById("score-val");
        if (scoreEl) scoreEl.innerText = state.score;
      }

      function renderShell() {
        const app = document.getElementById("app");
        if (state.view === "menu") {
          app.innerHTML = `<div class="flex flex-col items-center fade-in text-center px-6">
                    <div class="mb-6 text-orange-600 drop-shadow-lg">${icons.brain}</div>
                    <h1 class="text-6xl font-black text-orange-800 mb-2 tracking-tight">Math Mind</h1>
                    <p class="text-2xl text-gray-400 mb-12 italic">The Smart Way to Calculate!</p>
                    <button onclick="generateProblem()" class="w-72 p-8 bg-purple-600 border-b-8 border-purple-800 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all">PLAY NOW</button>
                </div>`;
          return;
        }
        app.innerHTML = `
                <div class="game-header">
                    <button onclick="state.view='menu'; state.score=0; renderShell()" class="header-btn quit-btn">QUIT</button>
                    <div class="header-btn score-box flex items-center gap-3">${icons.star} SCORE: <span id="score-val">${state.score}</span></div>
                </div>
                <div id="game-card" class="w-full bg-white rounded-[4rem] shadow-2xl p-6 relative flex-grow flex flex-col items-center border-b-[8px] border-orange-100 overflow-hidden max-h-[92vh]">
                    <div id="stack-area" class="sum-stack"></div>
                    <div id="active-container" class="active-container"></div>
                    <div id="step-area" class="step-area"></div>
                </div>`;
        renderStepContent();
      }

      function renderStepContent() {
        const stepArea = document.getElementById("step-area"),
          card = document.getElementById("game-card");
        if (!stepArea || !card) return;
        const p = state.currentProblem;
        if (state.step === 0)
          stepArea.innerHTML = renderDecomp(p.num1, p.opts1);
        else if (state.step === 1)
          stepArea.innerHTML = renderDecomp(p.num2, p.opts2);
        else if (state.step < 5) stepArea.innerHTML = renderSolve(p);
        else {
          card.classList.add("finished");
          stepArea.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in">
                    <div class="congrats-text">CONGRATULATIONS!</div>
                    <div class="final-result-text">RESULT: ${p.num1 - p.num2}</div>
                    <button onclick="generateProblem()" class="w-full py-6 bg-green-500 text-white rounded-[2rem] font-black text-3xl shadow-xl mt-12 hover:scale-105 active:scale-95 transition-all">NEXT MISSION</button>
                </div>`;
        }
      }

      function renderDecomp(num, opts) {
        return `<div class="w-full fade-in flex flex-col items-center">
                <p class="text-xs font-bold text-gray-300 uppercase tracking-widest mb-1">Simplify Now</p>
                <div class="focus-zone mb-2"><span class="target-num">${num}</span></div>
                <div class="grid grid-cols-2 gap-4 w-full">
                    ${opts.map((o, i) => `<button id="opt-${i}" onclick="handleOptionClick(${i}, ${o.c}, 'opt-${i}')" class="option-btn p-4 bg-white border-2 border-purple-100 rounded-[2rem] text-2xl font-black text-purple-700 hover:border-purple-300 active:scale-95 transition-all">${o.t}</button>`).join("")}
                </div>
            </div>`;
      }

      function renderSolve(p) {
        const lA = p.s1.landmark - p.s2.landmark,
          eA = p.s1.extra - p.s2.extra,
          total = p.num1 - p.num2;
        let c = `<div class="w-full flex flex-col items-center fade-in space-y-6">`;
        if (state.step === 2) {
          c += `<div class="w-full p-6 bg-blue-50 rounded-[2.5rem] border-2 border-blue-100 flex flex-col items-center fade-in">
                    <span class="step-label text-blue-500">3. Subtract Landmarks</span>
                    <div class="step-math-highlight text-blue-600">${p.s1.landmark} - ${p.s2.landmark}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="l_in" type="number" autofocus placeholder="?" class="w-32 text-center text-4xl font-black bg-white rounded-2xl p-2 border-4 border-blue-400 focus:outline-none">
                        <button onclick="checkInput('l_in', ${lA})" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 3) {
          c += `<div class="w-full p-6 bg-green-50 rounded-[2.5rem] border-2 border-green-100 flex flex-col items-center fade-in">
                    <span class="step-label text-green-500">4. Adjustments</span>
                    <div class="step-math-highlight text-green-600">${resolveDisplay(p.s1.extra, p.s2.extra)}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="e_in" type="number" autofocus placeholder="?" class="w-32 text-center text-4xl font-black bg-white rounded-2xl p-2 border-4 border-green-400 focus:outline-none">
                        <button onclick="checkInput('e_in', ${eA})" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 4) {
          c += `<div class="w-full p-8 bg-yellow-50 rounded-[3rem] border-4 border-yellow-300 flex flex-col items-center shadow-md fade-in">
                    <span class="step-label text-yellow-700">Final Total</span>
                    <div class="text-4xl font-black text-yellow-600 mb-4">${resolveDisplay(lA, eA, "+")}</div>
                    <div class="flex gap-4">
                        <input id="f_in" type="number" autofocus placeholder="?" class="w-40 text-center text-5xl font-black bg-white rounded-3xl p-3 border-4 border-yellow-500 focus:outline-none">
                        <button onclick="checkInput('f_in', ${total})" class="bg-yellow-500 text-white px-10 py-5 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all">CHECK</button>
                    </div></div>`;
        }
        return c + `</div>`;
      }

      // Lightweight Confetti Physics
      const confettiArr = [];
      function triggerConfetti() {
        const cvs = document.getElementById("confetti-canvas"),
          ctx = cvs.getContext("2d");
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        for (let i = 0; i < 150; i++)
          confettiArr.push({
            x: cvs.width / 2,
            y: cvs.height / 2,
            vx: (Math.random() - 0.5) * 15,
            vy: (Math.random() - 0.5) * 15 - 10,
            c: `hsl(${Math.random() * 360}, 70%, 60%)`,
            r: Math.random() * 8 + 4,
          });
        function anim() {
          ctx.clearRect(0, 0, cvs.width, cvs.height);
          confettiArr.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.4;
            p.vx *= 0.98;
            ctx.fillStyle = p.c;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            if (p.y > cvs.height) confettiArr.splice(i, 1);
          });
          if (confettiArr.length > 0) requestAnimationFrame(anim);
        }
        anim();
      }

      renderShell();
    </script>
  </body>
</html>
