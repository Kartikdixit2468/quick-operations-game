<!-- <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Mind: Place Value Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");

      body {
        font-family: "Fredoka", sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #fffaf0;
        touch-action: manipulation;
      }

      .game-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        position: relative;
        transition: max-width 0.4s ease;
      }

      #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* 3-Column Layout Animations */
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-50px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(50px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      .slide-left { animation: slideInLeft 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
      .slide-right { animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

      /* Full Tree Visualizer (For Learn Mode) */
      .tree-viewport {
        position: relative;
        width: 100%;
        height: 400px;
        display: flex;
        justify-content: center;
        margin-top: 1rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .tree-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .node {
        position: absolute;
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .node-level-1 { font-size: 3rem; color: #374151; top: 10px; }
      .node-level-2 {
        font-size: 2rem;
        top: 115px;
        padding: 0.25rem 1rem;
        border-radius: 1rem;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 2px solid #f3f4f6;
      }
      .node-level-3 {
        font-size: 1.8rem;
        top: 225px;
        padding: 0.5rem 1.25rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      }
      .node-level-4 {
        font-size: 4rem;
        color: #10b981;
        top: 315px;
        text-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
      }

      .root-line {
        stroke: #d1d5db; /* Fallback color */
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: growRoot 0.8s forwards ease-out;
        opacity: 0.7; /* Increased opacity for colors to pop */
      }

      @keyframes growRoot { to { stroke-dashoffset: 0; } }

      /* Step Area Animations */
      .step-area {
        width: 100%;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .fade-slide-in { animation: fadeSlideIn 0.5s both; }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateX(30px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .next-btn {
        background: #10b981;
        color: white;
        border-bottom: 6px solid #059669;
        padding: 1rem 3.5rem;
        font-size: 2.2rem;
        font-weight: 900;
        border-radius: 2rem;
        transition: all 0.2s;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      }
      .next-btn:active { transform: translateY(3px); border-bottom-width: 3px; }

      /* Shared Components */
      .focus-zone {
        background: radial-gradient(circle, rgba(216, 180, 254, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
        padding: 0.75rem;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: focus-pulse 2s infinite ease-in-out;
      }
      @keyframes focus-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }

      .target-num { font-size: 5rem; font-weight: 900; color: #9333ea; text-shadow: 0 4px 15px rgba(147, 51, 234, 0.25); }
      .option-btn { transition: all 0.2s; box-shadow: 0 4px 0 rgba(147, 51, 234, 0.1); }
      .vibrate { animation: vibrate 0.3s linear; }
      @keyframes vibrate {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }

      /* Interactive Equation Number Highlights */
      .interactive-num {
        color: #8b5cf6;
        cursor: pointer;
        display: inline-block;
        padding: 0.15rem 0.75rem;
        border-radius: 1rem;
        background: rgba(139, 92, 246, 0.1);
        border: 3px dashed #8b5cf6;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .interactive-num:hover {
        background: rgba(139, 92, 246, 0.2);
        transform: scale(1.05) translateY(-2px);
      }
      .interactive-num.pulse {
        animation: numPulse 2s infinite;
      }
      .interactive-num.active {
        background: rgba(139, 92, 246, 0.25);
        border-style: solid;
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.3);
        transform: scale(1.05);
      }
      @keyframes numPulse {
        0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(139, 92, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
      }

      /* Practice History Stack */
      .sum-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        min-height: 120px;
        justify-content: flex-end;
        margin-bottom: 0.25rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .history-item {
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 800;
        color: #8b5cf6;
        font-size: 1.15rem;
        opacity: 0;
        transform: translateY(15px) scale(0.8);
        margin-bottom: 4px;
      }

      .history-item.show { opacity: 0.85; transform: translateY(0) scale(1); }
      
      .finished .sum-stack { justify-content: center; min-height: 320px; margin-top: 1rem; }
      .finished .history-item {
        opacity: 1 !important;
        color: #10b981 !important;
        font-size: 1.6rem !important;
        transform: scale(1.15) !important;
        margin-bottom: 12px;
      }

      /* Sliding Active Sum */
      .active-container {
        position: relative;
        height: 60px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.5rem;
        transition: opacity 0.4s ease;
      }
      .finished .active-container { opacity: 0; height: 0; margin: 0; }

      .sum-text {
        position: absolute;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-weight: 900;
        font-size: 2.5rem;
        white-space: nowrap;
      }
      .sum-up { transform: translateY(-50px) scale(0.4); opacity: 0; }
      .sum-center { transform: translateY(0) scale(1); opacity: 1; color: #374151; }
      .sum-down { transform: translateY(40px) scale(0.8); opacity: 0; }
    </style>
  </head>
  <body class="bg-orange-50">
    <div id="help-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden items-center justify-center p-6" onclick="toggleHelp(false)">
      <div class="bg-white p-10 rounded-[3rem] max-w-lg w-full text-center shadow-2xl" onclick="event.stopPropagation()">
        <h2 class="text-4xl font-black text-blue-600 mb-4">How to Play</h2>
        <div class="space-y-4 text-xl text-gray-600 font-medium">
          <p>1️⃣ Break numbers into <span class="text-blue-500 font-bold">Tens</span> and <span class="text-red-500 font-bold">Ones</span>.</p>
          <p>2️⃣ Subtract the <span class="text-blue-500 font-bold">Tens</span> together.</p>
          <p>3️⃣ Subtract the <span class="text-red-500 font-bold">Ones</span> together.</p>
          <p>4️⃣ <span class="text-green-500 font-bold">Add</span> those two results to get the Final Total!</p>
        </div>
        <button onclick="toggleHelp(false)" class="mt-8 w-full py-4 bg-blue-500 text-white rounded-2xl font-black text-xl shadow-lg">GOT IT!</button>
      </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="app" class="game-container max-w-2xl mx-auto w-full"></div>

    <script>
      let state = {
        view: "menu",
        step: 0,
        currentProblem: null,
        score: 0,
        isProcessing: false,
        activeSum: "",
        history: [],
        wrongChoices: new Set(),
        
        // New State properties for Any-Order Decomposition
        decomp1: false,
        decomp2: false,
        activeDecomp: null, 
        showOptions: false
      };

      const icons = {
        brain: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 4 4 0 0 0 5.327 2.022A3 3 0 1 0 12 18"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 4 4 0 0 1-5.327 2.022A3 3 0 1 1 12 18"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.5 9.912a2.5 2.5 0 0 0-5-1.912"/><path d="M6.5 9.912a2.5 2.5 0 0 1 5-1.912"/><path d="M12 18v-5"/></svg>`,
        star: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        help: `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>`,
      };

      // Generates the equation string handling interactive buttons and solved states
      function getDecompEquation() {
          const p = state.currentProblem;
          if (p.isSimple) return `${p.num1} - ${p.num2}`;

          const getPart = (num, display, isDecomp, idx) => {
              if (isDecomp) return `(${display})`;
              const isPulse = state.activeDecomp ? '' : 'pulse';
              const isActive = state.activeDecomp === idx ? 'active' : '';
              return `<span class='interactive-num ${isPulse} ${isActive}' onclick='window.revealOptions(${idx})'>${num}</span>`;
          };

          const p1 = getPart(p.num1, p.s1.display, state.decomp1, 1);
          const p2 = getPart(p.num2, p.s2.display, state.decomp2, 2);
          
          return `${p1} - ${p2}`;
      }

      window.revealOptions = function(idx) {
          if (state.step === 0) {
              state.showOptions = true;
              state.activeDecomp = idx;
              
              const newSum = getDecompEquation();
              const textContainer = document.getElementById("active-container");
              if (textContainer) {
                  textContainer.innerHTML = `<div class="sum-text sum-center">${newSum}</div>`;
              }
              state.activeSum = newSum;
              renderStepContent();
          }
      };

      // FORMATTERS
      const formatSub = (v1, v2) => v2 < 0 ? `${v1} + ${Math.abs(v2)}` : `${v1} - ${v2}`;
      const formatAdd = (v1, v2) => v2 < 0 ? `${v1} - ${Math.abs(v2)}` : `${v1} + ${v2}`;

      function getSplit(n) {
        const ones = n % 10;
        const tens = Math.floor(n / 10) * 10;
        return { tens: tens, ones: ones, display: `${tens} + ${ones}` };
      }

      function toggleHelp(show) {
        document.getElementById("help-modal").style.display = show ? "flex" : "none";
      }

      function generateProblem() {
        let n1, n2;
        while (true) {
            n1 = Math.floor(Math.random() * 60) + 30; // 30 to 89
            n2 = Math.floor(Math.random() * (n1 - 15)) + 11; // 11 to n1-15
            const o1 = n1 % 10;
            const o2 = n2 % 10;
            
            if (o1 !== 0 && o1 >= o2) break;
        }
        
        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getSplit(n1),
          s2: getSplit(n2),
          opts1: generateOptions(n1),
          opts2: generateOptions(n2),
          isSimple: (n1 % 10 === n2 % 10),
          isN2Zero: (n2 % 10 === 0) 
        };
        
        state.step = 0;
        state.view = "practice";
        state.history = [];
        state.wrongChoices.clear();
        state.decomp1 = false;
        state.decomp2 = state.currentProblem.isN2Zero;
        state.activeDecomp = null;
        state.showOptions = false;
        
        renderShell();
        triggerEvolution(getDecompEquation());
      }

      function startLearn() {
        const n1 = 87, n2 = 26;
        state.currentProblem = {
          num1: n1, num2: n2,
          s1: getSplit(n1), s2: getSplit(n2),
          isSimple: false,
          isN2Zero: false
        };
        state.step = 0;
        state.view = "learn";
        state.history = [];
        state.showOptions = false;
        renderShell();
        triggerEvolution(`${n1} - ${n2}`); 
      }

      function nextLearnStep() {
        if (state.isProcessing) return;
        state.isProcessing = true;

        let hLabel = "";
        if (state.step === 0) hLabel = "Step 1: 87 = 80 + 7";
        else if (state.step === 1) hLabel = "Step 2: 26 = 20 + 6";
        else if (state.step === 2) hLabel = "Step 3: Tens ➔ 80 - 20 = 60";
        else if (state.step === 3) hLabel = "Step 4: Ones ➔ 7 - 6 = 1";
        else if (state.step === 4) hLabel = "Final: 87 - 26 = 61";
        
        if (hLabel) {
            state.history.push(hLabel);
            updateHistoryStack();
        }

        let nextSum = "";
        if (state.step === 0) nextSum = `(80 + 7) - 26`;
        else if (state.step === 1) nextSum = `(80 + 7) - (20 + 6)`;
        else if (state.step === 2) nextSum = `60 + (7 - 6)`;
        else if (state.step === 3) nextSum = `87 - 26 = ?`;
        else if (state.step === 4) nextSum = `87 - 26 = 61`;

        if (nextSum) triggerEvolution(nextSum);

        setTimeout(() => {
          state.step++;
          state.isProcessing = false;
          renderStepContent();
        }, 600);
      }

      function generateOptions(n) {
        const split = getSplit(n), tens = split.tens, ones = split.ones;
        let set = new Set([split.display]);
        
        const dists = [
          () => `${tens - 10} + ${ones + 10}`,
          () => `${tens + 10} - ${10 - ones}`,
          () => `${tens + 5} ${ones > 5 ? "-" : "+"} ${Math.abs(ones - 5) || 2}`,
        ];
        dists.forEach((l) => {
          let c = l();
          if (set.has(c)) c = `${tens - 20} + ${ones + 20}`;
          set.add(c);
        });

        let f = 10;
        while(set.size < 4) {
            set.add(`${tens - f} + ${ones + f}`);
            f += 10;
        }

        return Array.from(set)
          .slice(0, 4)
          .map((t) => ({ t, c: t === split.display }))
          .sort(() => Math.random() - 0.5);
      }

      function handleOptionClick(idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        const btn = document.getElementById(btnId);
        const p = state.currentProblem;

        if (isCorrect) {
          state.isProcessing = true;
          btn.classList.add("border-green-500", "bg-green-50", "ring-4", "ring-green-100");
          
          const currentNum = state.activeDecomp === 1 ? p.num1 : p.num2;
          const currentSplit = state.activeDecomp === 1 ? p.s1.display : p.s2.display;
          
          state.history.push(`✓ ${currentNum} = ${currentSplit}`);
          updateHistoryStack();

          // Mark correct
          if (state.activeDecomp === 1) state.decomp1 = true;
          if (state.activeDecomp === 2) state.decomp2 = true;
          
          state.activeDecomp = null;
          state.showOptions = false;

          triggerEvolution(getDecompEquation());
          
          setTimeout(() => {
            if (state.decomp1 && state.decomp2) {
                state.step = 2; // Phase 2: Solving
            }
            state.isProcessing = false;
            renderStepContent();
          }, 800);
        } else {
          btn.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(() => btn.classList.remove("vibrate", "border-red-500", "bg-red-50"), 300);
        }
      }

      function checkInput(id, expected) {
        if (state.isProcessing) return;
        const input = document.getElementById(id), val = parseInt(input.value), p = state.currentProblem;
          
        if (val === expected) {
          state.isProcessing = true;
          input.classList.add("border-green-500", "bg-green-50");
          const total = p.num1 - p.num2;

          if (p.isSimple) {
              state.history.push(`Final: ${p.num1} - ${p.num2} = ${total}`);
              updateHistoryStack();
              triggerEvolution(`${p.num1} - ${p.num2} = ${total}`);

              setTimeout(() => {
                state.step++;
                state.isProcessing = false;
                state.score += 20;
                updateScoreDisplay();
                triggerConfetti();
                renderStepContent();
              }, 800);
              return;
          }
          
          let summary = "";
          if (state.step === 2) {
              const stepLabel = p.isN2Zero ? "Step 2" : "Step 3";
              summary = `${stepLabel}: Tens ➔ ${p.s1.tens} - ${p.s2.tens} = ${p.s1.tens - p.s2.tens}`;
          } else if (state.step === 3) {
              summary = `Step 4: Ones ➔ ${p.s1.ones} - ${p.s2.ones} = ${p.s1.ones - p.s2.ones}`;
          } else if (state.step === 4) {
              summary = `Final: ${p.num1} - ${p.num2} = ${total}`;
          }

          if (summary) {
              state.history.push(summary);
              updateHistoryStack();
          }

          let nextSum = "";
          if (state.step === 2) {
              if (p.isN2Zero) {
                  nextSum = `${p.num1} - ${p.num2} = ?`; 
              } else {
                  nextSum = `${p.s1.tens - p.s2.tens} + (${formatSub(p.s1.ones, p.s2.ones)})`;
              }
          } else if (state.step === 3) {
              nextSum = `${p.num1} - ${p.num2} = ?`; 
          } else if (state.step === 4) {
              nextSum = `${p.num1} - ${p.num2} = ${total}`;
          }
          if (nextSum) triggerEvolution(nextSum);

          setTimeout(() => {
            if (state.step === 2 && p.isN2Zero) {
                state.step = 4;
            } else {
                state.step++;
            }

            state.isProcessing = false;
            if (state.step === 5) {
              state.score += 20;
              updateScoreDisplay();
              triggerConfetti();
            }
            renderStepContent();
          }, 800);
        } else {
          input.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(id)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(id);
            updateScoreDisplay();
          }
          setTimeout(() => input.classList.remove("vibrate", "border-red-500", "bg-red-50"), 300);
        }
      }

      function updateHistoryStack() {
        const stack = document.getElementById("stack-area");
        if (!stack) return;
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = state.history[state.history.length - 1]; 
        stack.appendChild(item);
        requestAnimationFrame(() => item.classList.add("show"));
      }

      function triggerEvolution(newSum) {
        const container = document.getElementById("active-container");
        if (!container) return;
        const current = container.querySelector(".sum-center");
        if (current) {
          current.classList.replace("sum-center", "sum-up");
          setTimeout(() => current.remove(), 600);
        }
        const inc = document.createElement("div");
        inc.className = "sum-text sum-down";
        inc.innerHTML = newSum; // Allow HTML parsing for interactive span
        container.appendChild(inc);
        requestAnimationFrame(() => inc.classList.replace("sum-down", "sum-center"));
        state.activeSum = newSum;
      }

      function updateScoreDisplay() {
        const scoreVal = document.getElementById("score-val");
        if(scoreVal) scoreVal.innerText = state.score;
      }

      function renderShell() {
        const app = document.getElementById("app");
        
        if (state.view === "menu") {
          app.className = "game-container max-w-2xl mx-auto w-full";
          app.innerHTML = `<div class="flex flex-col items-center fade-in text-center">
                    <div class="mb-4 text-orange-600 drop-shadow-lg">${icons.brain}</div>
                    <h1 class="text-7xl font-black text-orange-800 mb-2 tracking-tight">Math Mind</h1>
                    <p class="text-3xl text-gray-400 mb-10 italic">Split & Subtract Method!</p>
                    <div class="flex flex-col gap-4 w-full max-w-sm">
                        <button onclick="startLearn()" class="p-8 bg-blue-500 border-b-8 border-blue-700 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Learn Shortcut</button>
                        <button onclick="generateProblem()" class="p-8 bg-purple-600 border-b-8 border-purple-800 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Play Game</button>
                    </div>
                </div>`;
          return;
        }

        app.className = "game-container max-w-[1400px] mx-auto w-full";
        app.innerHTML = `
            <div class="flex flex-row items-center justify-between w-full h-full gap-6 lg:gap-10">
                <div class="flex flex-col justify-center w-[200px] lg:w-[240px] shrink-0 slide-left" style="animation-delay: 0.1s">
                    <button onclick="state.view='menu'; state.score=0; renderShell()" class="bg-white text-gray-400 border-b-[8px] border-gray-200 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black hover:scale-105 active:scale-95 transition-all w-full mb-6 flex items-center justify-center gap-2">
                        QUIT
                    </button>
                    <button onclick="toggleHelp(true)" class="bg-blue-500 text-white border-b-[8px] border-blue-700 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 w-full">
                        ${icons.help} HELP
                    </button>
                </div>

                <div id="game-card" class="w-full bg-white rounded-[4rem] shadow-2xl p-6 lg:p-8 relative flex-grow flex flex-col items-center border-b-[12px] border-orange-100 overflow-hidden h-[92vh] max-h-[900px] max-w-4xl z-10">
                    <div id="stack-area" class="sum-stack ${state.view === "learn" ? "hidden" : ""}"></div>
                    <div id="active-container" class="active-container ${state.view === "learn" ? "hidden" : ""}"></div>
                    <div id="tree-area" class="w-full"></div>
                    <div id="step-area" class="step-area"></div>
                </div>

                <div class="flex flex-col justify-start h-[92vh] max-h-[900px] w-[200px] lg:w-[240px] shrink-0 pt-8 slide-right" style="animation-delay: 0.2s">
                    <div class="flex flex-col items-center bg-yellow-400 text-white rounded-[3rem] py-10 px-4 shadow-2xl border-b-[8px] border-yellow-600 w-full mt-4">
                        <div class="flex items-center gap-3 text-xl lg:text-2xl font-bold uppercase tracking-widest opacity-90 mb-4">
                            ${icons.star} Score
                        </div>

                </div>
            </div>
        `;
        renderStepContent();
      }

      function renderStepContent() {
        const stepArea = document.getElementById("step-area"), treeArea = document.getElementById("tree-area");
        if (!stepArea || !treeArea) return;
        const p = state.currentProblem;

        if (state.view === "learn") {
          renderLearnTree(treeArea, p);
          renderLearnInstructions(stepArea, p);
        } else {
          renderPracticeGame(stepArea, treeArea, p);
        }
      }

      function renderLearnTree(area, p) {
        const s = state.step;
        const tensDiff = p.s1.tens - p.s2.tens;
        const onesDiff = p.s1.ones - p.s2.ones;

        const LX1 = 20, AX1 = 38, LX2 = 62, AX2 = 80;
        const LC = 42, AC = 58, FINAL = 50;

        let html = `<div class="tree-viewport">
                <svg class="tree-svg">
                    ${s >= 1 ? `<line x1="40%" y1="55" x2="${LX1}%" y2="115" class="root-line" style="stroke: #3b82f6;" /><line x1="40%" y1="55" x2="${AX1}%" y2="115" class="root-line" style="stroke: #ef4444;" />` : ""}
                    ${s >= 2 ? `<line x1="60%" y1="55" x2="${LX2}%" y2="115" class="root-line" style="stroke: #3b82f6;" /><line x1="60%" y1="55" x2="${AX2}%" y2="115" class="root-line" style="stroke: #ef4444;" />` : ""}
                    ${s >= 3 ? `<line x1="${LX1}%" y1="140" x2="${LC}%" y2="225" class="root-line" style="stroke: #2563eb;" /><line x1="${LX2}%" y1="140" x2="${LC}%" y2="225" class="root-line" style="stroke: #2563eb;" />` : ""}
                    ${s >= 4 ? `<line x1="${AX1}%" y1="140" x2="${AC}%" y2="225" class="root-line" style="stroke: #dc2626;" /><line x1="${AX2}%" y1="140" x2="${AC}%" y2="225" class="root-line" style="stroke: #dc2626;" />` : ""}
                    ${s >= 5 ? `<line x1="${LC}%" y1="265" x2="${FINAL}%" y2="315" class="root-line" style="stroke: #10b981;" /><line x1="${AC}%" y1="265" x2="${FINAL}%" y2="315" class="root-line" style="stroke: #10b981;" />` : ""}
                </svg>`;

        html += `<div class="node node-level-1" style="left: 50%">${p.num1} - ${p.num2}</div>`;

        if (s >= 1) {
          html += `<div class="node node-level-2" style="left: ${LX1}%; color:#3b82f6">${p.s1.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX1}%; color:#ef4444">${p.s1.ones}</div>`;
        }
        if (s >= 2) {
          html += `<div class="node node-level-2" style="left: ${LX2}%; color:#3b82f6">${p.s2.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX2}%; color:#ef4444">${p.s2.ones}</div>`;
        }
        if (s >= 3)
          html += `<div class="node node-level-3" style="left: ${LC}%; color: #2563eb; border: 2px solid #bfdbfe;">${tensDiff}</div>`;
        if (s >= 4)
          html += `<div class="node node-level-3" style="left: ${AC}%; color: #dc2626; border: 2px solid #fecaca;">${onesDiff}</div>`;
        if (s >= 5)
          html += `<div class="node node-level-4" style="left: ${FINAL}%">${p.num1 - p.num2}</div>`;

        area.innerHTML = html + `</div>`;
      }

      function renderLearnInstructions(area, p) {
        const steps = [
          "Let's solve <span class='text-purple-600 font-bold'>87 - 26</span>. Watch how we break them into Tens and Ones!",
          "<span class='text-purple-600 font-bold'>87</span> is made of <span class='text-blue-500 font-bold'>80</span> and <span class='text-red-500 font-bold'>7</span>.",
          "Next, <span class='text-purple-600 font-bold'>26</span> is made of <span class='text-blue-500 font-bold'>20</span> and <span class='text-red-500 font-bold'>6</span>.",
          "First, subtract the Tens: <span class='text-blue-600 font-bold'>80 - 20 = 60</span>.",
          "Next, subtract the Ones: <span class='text-red-600 font-bold'>7 - 6 = 1</span>.",
          "Finally, join the results: <span class='text-green-600 font-bold'>60 + 1 = 61</span>. You did it!",
          "",
        ];

        if (state.step < 6) {
          area.innerHTML = `<div class="flex flex-col items-center fade-slide-in">
                    <p class="text-2xl font-semibold text-gray-600 text-center mb-6 leading-tight">${steps[state.step]}</p>
                    <button onclick="nextLearnStep()" class="next-btn">NEXT</button>
                </div>`;
        } else {
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in">
                    <div class="text-3xl font-black text-gray-500 mb-6 text-center uppercase tracking-widest">Lesson Complete</div>
                    <button onclick="state.view='menu'; renderShell()" class="w-full py-5 bg-blue-500 text-white rounded-[2rem] font-black text-3xl shadow-xl mt-2 hover:scale-105 active:scale-95 transition-all">MAIN MENU</button>
                </div>`;
        }
      }

      function renderPracticeGame(area, tree, p) {
        tree.innerHTML = ""; 
        
        const isFinished = (p.isSimple && state.step >= 1) || (!p.isSimple && state.step >= 5);
        
        let stackHtml = "";
        
        if (isFinished) {
            stackHtml += `<div class="text-5xl lg:text-6xl font-black text-gray-900 mb-6 drop-shadow-sm fade-in">${p.num1} - ${p.num2}</div>`;
        }
        
        stackHtml += state.history.map((txt) => `<div class="history-item show">${txt}</div>`).join("");
        document.getElementById("stack-area").innerHTML = stackHtml;
        
        const textContainer = document.getElementById("active-container");
        if (textContainer) {
            textContainer.innerHTML = `<div class="sum-text sum-center">${state.activeSum}</div>`;
        }

        if (p.isSimple) {
            if (state.step === 0) area.innerHTML = renderSimpleSolve(p);
            else {
              document.getElementById("game-card").classList.add("finished");
              area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-2">
                        <div class="text-3xl font-black text-blue-500 tracking-widest uppercase mb-4 drop-shadow-sm">Bonus Cleared!</div>
                        <button onclick="generateProblem()" class="w-full py-4 bg-blue-500 text-white rounded-[2rem] font-black text-3xl shadow-xl hover:scale-105 active:scale-95 transition-all">NEXT MISSION</button>
                    </div>`;
            }
            return;
        }

        if (state.step === 0) area.innerHTML = renderDecomp();
        else if (state.step < 5) area.innerHTML = renderSolve(p);
        else {
          document.getElementById("game-card").classList.add("finished");
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-2">
                    <div class="text-3xl font-black text-purple-500 tracking-widest uppercase mb-4 drop-shadow-sm">Mission Accomplished!</div>
                    <button onclick="generateProblem()" class="w-full py-4 bg-green-500 text-white rounded-[2rem] font-black text-3xl shadow-xl hover:scale-105 active:scale-95 transition-all">NEXT MISSION</button>
                </div>`;
        }
      }

      function renderSimpleSolve(p) {
        const total = p.num1 - p.num2;
        return `<div class="w-full flex flex-col items-center fade-in space-y-6">
            <div class="w-full p-8 bg-blue-50 rounded-[4rem] border-4 border-blue-300 flex flex-col items-center shadow-md fade-in relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-blue-500 text-white px-8 py-2 rounded-bl-[2rem] font-black tracking-widest text-lg">BONUS!</div>
                <span class="text-2xl font-black text-blue-700 mb-2 uppercase tracking-widest mt-4">Same Ones Digit!</span>
                <div class="text-xl font-bold text-gray-500 mb-6 text-center max-w-sm">The ones digits cancel out to zero. Just subtract the tens!</div>
                <div class="text-6xl font-black text-blue-600 mb-6">${p.s1.tens} - ${p.s2.tens}</div>
                <div class="flex gap-4">
                    <input id="simple_in" type="number" autofocus placeholder="?" class="w-48 text-center text-6xl font-black bg-white rounded-[2rem] p-4 border-4 border-blue-500 focus:outline-none">
                    <button onclick="checkInput('simple_in', ${total})" class="bg-blue-500 text-white px-12 py-6 rounded-[2rem] font-black text-3xl shadow-xl active:scale-95 transition-all">CHECK</button>
                </div>
            </div>
        </div>`;
      }

      function renderDecomp() {
        const p = state.currentProblem;
        if (!state.showOptions) {
            // Provide a neutral click to default to the first available non-decomposed number
            const targetIdx = !state.decomp1 ? 1 : 2;
            return `<div class="w-full fade-in flex flex-col items-center justify-center py-10 mt-6">
                <div class="text-2xl font-bold text-purple-500 animate-bounce flex items-center gap-3 bg-purple-50 px-8 py-4 rounded-full border-2 border-purple-200 shadow-sm cursor-pointer" onclick="window.revealOptions(${targetIdx})">
                    👉 Choose any number by clicking above in the problem.
                </div>
            </div>`;
        }

        const num = state.activeDecomp === 1 ? p.num1 : p.num2;
        const opts = state.activeDecomp === 1 ? p.opts1 : p.opts2;

        return `<div class="w-full fade-in flex flex-col items-center mt-2">
                <div class="focus-zone mb-4"><span class="target-num">${num}</span></div>
                <div class="grid grid-cols-2 gap-4 w-full">
                    ${opts.map((o, i) => `<button id="opt-${i}" onclick="handleOptionClick(${i}, ${o.c}, 'opt-${i}')" class="option-btn p-5 bg-white border-2 border-purple-100 rounded-[2.5rem] text-3xl font-black text-purple-700 hover:border-purple-300 active:scale-95 transition-all">${o.t}</button>`).join("")}
                </div>
            </div>`;
      }

      function renderSolve(p) {
        const tensDiff = p.s1.tens - p.s2.tens;
        const onesDiff = p.s1.ones - p.s2.ones;
        const total = p.num1 - p.num2;
        
        let html = `<div class="w-full flex flex-col items-center fade-in space-y-6">`;
        if (state.step === 2) {
          const stepLabel = p.isN2Zero ? "2" : "3";
          html += `<div class="w-full p-6 bg-blue-50 rounded-[3rem] border-2 border-blue-100 flex flex-col items-center fade-in">
                    <span class="text-xl font-bold text-blue-500 mb-2 uppercase tracking-widest">${stepLabel}. Subtract Tens</span>
                    <div class="text-3xl font-black text-blue-600 mb-4">${p.s1.tens} - ${p.s2.tens}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="l_in" type="number" autofocus placeholder="?" class="w-36 text-center text-5xl font-black bg-white rounded-3xl p-3 border-4 border-blue-400 focus:outline-none">
                        <button onclick="checkInput('l_in', ${tensDiff})" class="bg-blue-600 text-white px-10 py-4 rounded-3xl font-bold text-2xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 3) {
          html += `<div class="w-full p-6 bg-red-50 rounded-[3rem] border-2 border-red-100 flex flex-col items-center fade-in">
                    <span class="text-xl font-bold text-red-500 mb-2 uppercase tracking-widest">4. Subtract Ones</span>
                    <div class="text-3xl font-black text-red-600 mb-4">${p.s1.ones} - ${p.s2.ones}</div>
                    <div class="flex gap-4 mt-2">
                        <input id="e_in" type="number" autofocus placeholder="?" class="w-36 text-center text-5xl font-black bg-white rounded-3xl p-3 border-4 border-red-400 focus:outline-none">
                        <button onclick="checkInput('e_in', ${onesDiff})" class="bg-red-600 text-white px-10 py-4 rounded-3xl font-bold text-2xl shadow-lg active:scale-95 transition-all">OK</button>
                    </div></div>`;
        } else if (state.step === 4) {
          const logicString = p.isN2Zero 
              ? `(${p.s1.tens} - ${p.num2}) + ${p.s1.ones}`
              : `(${p.s1.tens} - ${p.s2.tens}) + (${p.s1.ones} - ${p.s2.ones})`;
              
          html += `<div class="w-full p-8 bg-yellow-50 rounded-[4rem] border-4 border-yellow-300 flex flex-col items-center shadow-md fade-in">
                    <span class="text-2xl font-black text-yellow-700 mb-2 uppercase tracking-widest">Final Total</span>
                    
                    <div class="bg-white/60 px-8 py-4 rounded-[2rem] mb-6 flex flex-col items-center border-2 border-yellow-200 shadow-sm w-full max-w-md">
                        <div class="text-xl font-bold text-gray-400 mb-1">${p.num1} - ${p.num2}</div>
                        <div class="text-lg font-bold text-yellow-600/70 mb-2">${logicString}</div>
                        <div class="text-5xl font-black text-yellow-600">${formatAdd(tensDiff, p.isN2Zero ? p.s1.ones : onesDiff)}</div>
                    </div>

                    <div class="flex gap-4">
                        <input id="f_in" type="number" autofocus placeholder="?" class="w-48 text-center text-6xl font-black bg-white rounded-[2rem] p-4 border-4 border-yellow-500 focus:outline-none">
                        <button onclick="checkInput('f_in', ${total})" class="bg-yellow-500 text-white px-12 py-6 rounded-[2rem] font-black text-3xl shadow-xl active:scale-95 transition-all">CHECK</button>
                    </div></div>`;
        }
        return html + `</div>`;
      }

      const confettiArr = [];
      function triggerConfetti() {
        const cvs = document.getElementById("confetti-canvas"), ctx = cvs.getContext("2d");
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        for (let i = 0; i < 200; i++)
          confettiArr.push({
            x: cvs.width / 2, y: cvs.height / 2,
            vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 15,
            c: `hsl(${Math.random() * 360}, 75%, 60%)`, r: Math.random() * 10 + 5,
          });
        function anim() {
          ctx.clearRect(0, 0, cvs.width, cvs.height);
          confettiArr.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.vx *= 0.97;
            ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
            if (p.y > cvs.height) confettiArr.splice(i, 1);
          });
          if (confettiArr.length > 0) requestAnimationFrame(anim);
        }
        anim();
      }

      renderShell();
    </script>
