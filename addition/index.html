<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Mind: Quick Addition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");

      body {
        font-family: "Fredoka", sans-serif;
        overflow: hidden;
        height: 100vh;
        background-color: #f0fdf4; /* Soft green for addition theme */
        touch-action: manipulation;
      }

      .game-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        position: relative;
        transition: max-width 0.4s ease;
      }

      #confetti-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .slide-left {
        animation: slideInLeft 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .slide-right {
        animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .tree-viewport {
        position: relative;
        width: 100%;
        height: 310px;
        display: flex;
        justify-content: center;
        margin-top: 1.5rem;
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .tree-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .node {
        position: absolute;
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      .node-level-1 {
        font-size: 3.5rem;
        color: #374151;
        top: 0px;
      }
      .node-level-2 {
        font-size: 2rem;
        top: 85px;
        padding: 0.25rem 1rem;
        border-radius: 1rem;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 2px solid #f3f4f6;
      }
      .node-level-3 {
        font-size: 1.8rem;
        top: 175px;
        padding: 0.5rem 1.25rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      }
      .node-level-4 {
        font-size: 4rem;
        color: #16a34a;
        top: 250px;
        text-shadow: 0 4px 10px rgba(22, 163, 74, 0.2);
      }

      .root-line {
        stroke-width: 3.5;
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: growRoot 0.5s forwards ease-out;
        opacity: 0.7;
      }
      @keyframes growRoot {
        to {
          stroke-dashoffset: 0;
        }
      }

      .step-area {
        width: 100%;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .fade-slide-in {
        animation: fadeSlideIn 0.5s both;
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .next-btn {
        background: #16a34a;
        color: white;
        border-bottom: 6px solid #15803d;
        padding: 1rem 3.5rem;
        font-size: 2.2rem;
        font-weight: 900;
        border-radius: 2rem;
        transition: all 0.2s;
        box-shadow: 0 10px 25px rgba(22, 163, 74, 0.3);
      }
      .next-btn:active {
        transform: translateY(3px);
        border-bottom-width: 3px;
      }

      .interactive-num {
        color: #16a34a;
        cursor: pointer;
        display: inline-block;
        padding: 0.15rem 0.75rem;
        border-radius: 1rem;
        background: rgba(22, 163, 74, 0.1);
        border: 3px dashed #16a34a;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 20;
      }
      .interactive-num:hover {
        background: rgba(22, 163, 74, 0.2);
        transform: scale(1.05) translateY(-2px);
      }
      .interactive-num.pulse {
        animation: numPulse 2s infinite;
      }
      .interactive-num.active {
        background: rgba(22, 163, 74, 0.25);
        border-style: solid;
        box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.3);
        transform: scale(1.05);
      }
      @keyframes numPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }

      .option-btn {
        transition: all 0.2s;
        box-shadow: 0 4px 0 rgba(22, 163, 74, 0.1);
      }
      .vibrate {
        animation: vibrate 0.3s linear;
      }
      @keyframes vibrate {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="help-modal"
      class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden items-center justify-center p-6"
      onclick="toggleHelp(false)"
    >
      <div
        class="bg-white p-10 rounded-[3rem] max-w-lg w-full text-center shadow-2xl"
        onclick="event.stopPropagation()"
      >
        <h2 class="text-4xl font-black text-green-600 mb-4">Quick Addition</h2>
        <div class="space-y-4 text-xl text-gray-600 font-medium">
          <p>
            1️⃣ Break numbers into
            <span class="text-blue-500 font-bold">Tens</span> and
            <span class="text-red-500 font-bold">Ones</span>.
          </p>
          <p>
            2️⃣ Add the
            <span class="text-blue-500 font-bold">Tens</span> together.
          </p>
          <p>
            3️⃣ Add the
            <span class="text-red-500 font-bold">Ones</span> together.
          </p>
          <p>4️⃣ Join them up for the Final Total!</p>
        </div>
        <button
          onclick="toggleHelp(false)"
          class="mt-8 w-full py-4 bg-green-500 text-white rounded-2xl font-black text-xl shadow-lg"
        >
          GOT IT!
        </button>
      </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="app" class="game-container max-w-2xl mx-auto w-full"></div>

    <script>
      // --- AUDIO SETUP ---
      const sfxSelect = new Audio("../click.mp3");
      sfxSelect.volume = 0.9;

      const sfxCongrats = new Audio("../congrats.mp3");
      sfxCongrats.volume = 0.9;

      const sfxWrong = new Audio("../wrong.mp3");
      sfxWrong.volume = 0.9;

      const bgMusic = new Audio("../bg_music.mp3");
      bgMusic.volume = 0.4;
      bgMusic.loop = true;

      function playSelect() {
        sfxSelect.currentTime = 0;
        sfxSelect.play().catch((e) => console.log("Audio play failed: ", e));
      }

      function playCongrats() {
        sfxCongrats.currentTime = 0;
        sfxCongrats.play().catch((e) => console.log("Audio play failed: ", e));
      }

      function playWrong() {
        sfxWrong.currentTime = 0;
        sfxWrong.play().catch((e) => console.log("Audio play failed: ", e));
      }

      function ensureBGM() {
        if (bgMusic.paused) {
          bgMusic
            .play()
            .catch((e) =>
              console.log("BGM play failed (needs interaction): ", e),
            );
        }
      }
      // -------------------

      let state = {
        view: "menu",
        step: 0,
        currentProblem: null,
        score: 0,
        isProcessing: false,
        wrongChoices: new Set(),
        decomp1: false,
        decomp2: false,
        activeDecomp: null,
        showOptions: false,
      };

      const icons = {
        brain: `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105 4 4 0 0 0 5.327 2.022A3 3 0 1 0 12 18"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 8.105 4 4 0 0 1-5.327 2.022A3 3 0 1 1 12 18"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.5 9.912a2.5 2.5 0 0 0-5-1.912"/><path d="M6.5 9.912a2.5 2.5 0 0 1 5-1.912"/><path d="M12 18v-5"/></svg>`,
        star: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="text-white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        help: `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>`,
      };

      function getRootEquation() {
        const p = state.currentProblem;
        if (p.isSimple || state.view === "learn")
          return `${p.num1} + ${p.num2}`;

        const getPart = (num, isDecomp, idx) => {
          if (isDecomp) return `<span class='text-gray-800 px-3'>${num}</span>`;
          const isPulse = state.activeDecomp ? "" : "pulse";
          const isActive = state.activeDecomp === idx ? "active" : "";
          return `<span class='interactive-num ${isPulse} ${isActive}' onclick='window.revealOptions(${idx})'>${num}</span>`;
        };

        const p1 = getPart(p.num1, state.decomp1, 1);
        const p2 = getPart(p.num2, state.decomp2, 2);

        return `${p1} + ${p2}`;
      }

      window.revealOptions = function (idx) {
        playSelect();
        if (state.step === 0 || state.step === 1) {
          state.showOptions = true;
          state.activeDecomp = idx;
          renderStepContent();
        }
      };

      function getSplit(n) {
        const ones = n % 10;
        const tens = Math.floor(n / 10) * 10;
        return { tens: tens, ones: ones, display: `${tens} + ${ones}` };
      }

      // Generates logical MCQs for the calculation steps
      function generateMathOptions(correctVal, type) {
        let set = new Set([correctVal]);
        let offset = type === "tens" ? 10 : type === "ones" ? 1 : 5;

        while (set.size < 4) {
          let mod = Math.random() > 0.5 ? 1 : -1;
          let val =
            correctVal + mod * offset * (Math.floor(Math.random() * 3) + 1);
          if (val >= 0) set.add(val);
        }

        return Array.from(set)
          .sort((a, b) => a - b)
          .map((v) => ({ text: v, correct: v === correctVal }));
      }

      function toggleHelp(show) {
        playSelect();
        document.getElementById("help-modal").style.display = show
          ? "flex"
          : "none";
      }

      function quitToMenu() {
        playSelect();
        state.view = "menu";
        state.score = 0;
        renderShell();
      }

      function generateProblem() {
        playSelect();
        ensureBGM();

        let n1, n2;
        while (true) {
          n1 = Math.floor(Math.random() * 50) + 21;
          n2 = Math.floor(Math.random() * 40) + 11;
          if (n1 % 10 !== 0) break;
        }

        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getSplit(n1),
          s2: getSplit(n2),
          opts1: generateOptions(n1),
          opts2: generateOptions(n2),
          isSimple: false,
          isN2Zero: n2 % 10 === 0,
        };

        state.step = 0;
        state.view = "practice";
        state.wrongChoices.clear();
        state.decomp1 = false;
        state.decomp2 = state.currentProblem.isN2Zero;

        // Reset so user MUST click the number to start
        state.activeDecomp = null;
        state.showOptions = false;

        renderShell();
      }

      function startLearn() {
        playSelect();
        ensureBGM();

        let n1, n2;
        while (true) {
          n1 = Math.floor(Math.random() * 50) + 21;
          n2 = Math.floor(Math.random() * 40) + 11;
          if (n1 % 10 !== 0 && n2 % 10 !== 0) break;
        }

        state.currentProblem = {
          num1: n1,
          num2: n2,
          s1: getSplit(n1),
          s2: getSplit(n2),
          isSimple: false,
          isN2Zero: false,
        };
        state.step = 0;
        state.view = "learn";
        state.showOptions = false;
        renderShell();
      }

      function nextLearnStep() {
        playSelect();
        if (state.isProcessing) return;
        state.isProcessing = true;

        setTimeout(() => {
          state.step++;
          state.isProcessing = false;
          renderStepContent();
        }, 500);
      }

      function generateOptions(n) {
        const split = getSplit(n),
          tens = split.tens,
          ones = split.ones;
        let set = new Set([split.display]);

        const dists = [
          () => `${tens - 10} + ${ones + 10}`,
          () => `${tens + 10} - ${10 - ones}`,
          () => `${tens} - ${ones}`,
        ];
        dists.forEach((l) => {
          let c = l();
          if (set.has(c)) c = `${tens - 20} + ${ones + 20}`;
          set.add(c);
        });

        let f = 10;
        while (set.size < 4) {
          set.add(`${tens + f} + ${ones}`);
          f += 10;
        }

        return Array.from(set)
          .slice(0, 4)
          .map((t) => ({ t, c: t === split.display }))
          .sort(() => Math.random() - 0.5);
      }

      function handleStepChoice(isCorrect, btnId) {
        if (state.isProcessing) return;
        const btn = document.getElementById(btnId);

        if (isCorrect) {
          playSelect();
          state.score += 20;
          updateScoreDisplay();
          state.isProcessing = true;
          btn.classList.add(
            "border-green-500",
            "bg-green-50",
            "ring-4",
            "ring-green-100",
          );

          setTimeout(() => {
            if (state.step === 2 && state.currentProblem.isN2Zero) {
              state.step = 4;
            } else {
              state.step++;
            }
            state.isProcessing = false;
            if (state.step === 5) {
              playCongrats();
              triggerConfetti();
            }
            renderStepContent();
          }, 600);
        } else {
          playWrong();
          btn.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(
            () =>
              btn.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function handleOptionClick(idx, isCorrect, btnId) {
        if (state.isProcessing) return;
        const btn = document.getElementById(btnId);

        if (isCorrect) {
          playSelect();
          state.score += 20;
          updateScoreDisplay();
          state.isProcessing = true;

          btn.classList.add(
            "border-green-500",
            "bg-green-50",
            "ring-4",
            "ring-green-100",
          );

          if (state.activeDecomp === 1) state.decomp1 = true;
          if (state.activeDecomp === 2) state.decomp2 = true;

          // Smart Auto-Select: Logic to auto-open the remaining number
          if (state.decomp1 && !state.decomp2) {
            state.activeDecomp = 2;
            state.showOptions = true;
          } else if (!state.decomp1 && state.decomp2) {
            state.activeDecomp = 1;
            state.showOptions = true;
          } else {
            state.activeDecomp = null;
            state.showOptions = false;
          }

          renderStepContent();

          setTimeout(() => {
            if (state.decomp1 && state.decomp2) {
              state.step = 2;
            } else {
              state.step++;
            }
            state.isProcessing = false;
            renderStepContent();
          }, 600);
        } else {
          playWrong();
          btn.classList.add("vibrate", "border-red-500", "bg-red-50");
          if (!state.wrongChoices.has(btnId)) {
            state.score = Math.max(0, state.score - 5);
            state.wrongChoices.add(btnId);
            updateScoreDisplay();
          }
          setTimeout(
            () =>
              btn.classList.remove("vibrate", "border-red-500", "bg-red-50"),
            300,
          );
        }
      }

      function updateScoreDisplay() {
        const scoreVal = document.getElementById("score-val");
        if (scoreVal) scoreVal.innerText = state.score;
      }

      function renderShell() {
        const app = document.getElementById("app");

        if (state.view === "menu") {
          app.className = "game-container max-w-2xl mx-auto w-full";
          app.innerHTML = `<div class="flex flex-col items-center fade-in text-center">
                    <div class="mb-4 text-green-600 drop-shadow-lg">${icons.brain}</div>
                    <h1 class="text-7xl font-black text-green-800 mb-2 tracking-tight">Math Mind</h1>
                    <p class="text-3xl text-gray-400 mb-10 italic">Quick Addition Shortcut!</p>
                    <div class="flex flex-col gap-4 w-full max-w-sm">
                        <button onclick="startLearn()" class="p-8 bg-blue-500 border-b-8 border-blue-700 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Learn Shortcut</button>
                        <button onclick="generateProblem()" class="p-8 bg-green-600 border-b-8 border-green-800 rounded-[3rem] text-3xl font-bold text-white shadow-2xl active:scale-95 transition-all uppercase">Play Game</button>
                    </div>
                </div>`;
          return;
        }

        app.className = "game-container max-w-[1400px] mx-auto w-full";
        app.innerHTML = `
            <div class="flex flex-row items-center justify-between w-full h-full gap-6 lg:gap-10">
                <div class="flex flex-col justify-center w-[200px] lg:w-[240px] shrink-0 slide-left">
                    <button onclick="quitToMenu()" class="bg-white text-gray-400 border-b-[8px] border-gray-200 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black hover:scale-105 active:scale-95 transition-all w-full mb-6 flex items-center justify-center gap-2">
                        QUIT
                    </button>
                    <button onclick="toggleHelp(true)" class="bg-blue-500 text-white border-b-[8px] border-blue-700 rounded-[2.5rem] py-6 lg:py-8 px-4 shadow-xl text-2xl lg:text-3xl font-black hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 w-full">
                        ${icons.help} HELP
                    </button>
                </div>

                <div id="game-card" class="w-full bg-white rounded-[4rem] shadow-2xl p-6 lg:p-8 relative flex-grow flex flex-col items-center border-b-[12px] border-green-100 overflow-hidden h-[92vh] max-h-[900px] max-w-4xl z-10">
                    <div id="tree-area" class="w-full"></div>
                    <div id="step-area" class="step-area flex-grow"></div>
                </div>

                <div class="flex flex-col justify-start h-[92vh] max-h-[900px] w-[200px] lg:w-[240px] shrink-0 pt-8 slide-right">
                    <div class="flex flex-col items-center bg-yellow-400 text-white rounded-[3rem] py-10 px-4 shadow-2xl border-b-[8px] border-yellow-600 w-full mt-4">
                        <div class="flex items-center gap-3 text-xl lg:text-2xl font-bold uppercase tracking-widest opacity-90 mb-4">
                            ${icons.star} Score
                        </div>
                        <div id="score-val" class="text-7xl lg:text-8xl font-black drop-shadow-md">${state.score}</div>
                    </div>
                </div>
            </div>
        `;
        renderStepContent();
      }

      function renderStepContent() {
        const stepArea = document.getElementById("step-area"),
          treeArea = document.getElementById("tree-area");
        if (!stepArea || !treeArea) return;
        const p = state.currentProblem;

        if (state.view === "learn") {
          renderTree(treeArea, p);
          renderLearnInstructions(stepArea, p);
        } else {
          renderPracticeGame(stepArea, treeArea, p);
        }
      }

      function renderTree(area, p) {
        const s = state.step;
        const v = state.view;

        const showSplit1 = v === "learn" ? s >= 1 : state.decomp1;
        const showSplit2 = v === "learn" ? s >= 2 : state.decomp2;
        const showTens = s >= 3;
        const showOnes = s >= 4;
        const showFinal = s >= 5;

        const tensSum = p.s1.tens + p.s2.tens;
        const onesSum = p.s1.ones + p.s2.ones;

        const LX1 = 20,
          AX1 = 38,
          LX2 = 62,
          AX2 = 80;
        const LC = 42,
          AC = 58,
          FINAL = 50;

        let html = `<div class="tree-viewport">
                <svg class="tree-svg">
                    ${showSplit1 ? `<line x1="40%" y1="50" x2="${LX1}%" y2="105" class="root-line" style="stroke: #3b82f6;" /><line x1="40%" y1="50" x2="${AX1}%" y2="105" class="root-line" style="stroke: #ef4444;" />` : ""}
                    ${showSplit2 ? `<line x1="60%" y1="50" x2="${LX2}%" y2="105" class="root-line" style="stroke: #3b82f6;" /><line x1="60%" y1="50" x2="${AX2}%" y2="105" class="root-line" style="stroke: #ef4444;" />` : ""}
                    ${showTens ? `<line x1="${LX1}%" y1="130" x2="${LC}%" y2="185" class="root-line" style="stroke: #2563eb;" /><line x1="${LX2}%" y1="130" x2="${LC}%" y2="185" class="root-line" style="stroke: #2563eb;" />` : ""}
                    ${showOnes ? `<line x1="${AX1}%" y1="130" x2="${AC}%" y2="185" class="root-line" style="stroke: #dc2626;" /><line x1="${AX2}%" y1="130" x2="${AC}%" y2="185" class="root-line" style="stroke: #dc2626;" />` : ""}
                    ${showFinal ? `<line x1="${LC}%" y1="210" x2="${FINAL}%" y2="250" class="root-line" style="stroke: #16a34a;" /><line x1="${AC}%" y1="210" x2="${FINAL}%" y2="250" class="root-line" style="stroke: #16a34a;" />` : ""}
                </svg>`;

        html += `<div class="node node-level-1" style="left: 50%">${getRootEquation()}</div>`;

        if (showSplit1) {
          html += `<div class="node node-level-2" style="left: ${LX1}%; color:#3b82f6">${p.s1.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX1}%; color:#ef4444">${p.s1.ones}</div>`;
        }
        if (showSplit2) {
          html += `<div class="node node-level-2" style="left: ${LX2}%; color:#3b82f6">${p.s2.tens}</div>`;
          html += `<div class="node node-level-2" style="left: ${AX2}%; color:#ef4444">${p.s2.ones}</div>`;
        }
        if (showTens)
          html += `<div class="node node-level-3" style="left: ${LC}%; color: #2563eb; border: 2px solid #bfdbfe;">${tensSum}</div>`;
        if (showOnes)
          html += `<div class="node node-level-3" style="left: ${AC}%; color: #dc2626; border: 2px solid #fecaca;">${onesSum}</div>`;
        if (showTens && showOnes)
          html += `<div class="node font-black text-gray-400" style="left: 50%; top: 180px; font-size: 2.2rem;">+</div>`;
        if (showFinal)
          html += `<div class="node node-level-4" style="left: ${FINAL}%">${p.num1 + p.num2}</div>`;

        area.innerHTML = html + `</div>`;
      }

      function renderLearnInstructions(area, p) {
        const tensSum = p.s1.tens + p.s2.tens;
        const onesSum = p.s1.ones + p.s2.ones;
        const total = p.num1 + p.num2;

        const steps = [
          `Let's solve <span class='text-green-600 font-bold'>${p.num1} + ${p.num2}</span>.`,
          `<span class='text-green-600 font-bold'>${p.num1}</span> is <span class='text-blue-500 font-bold'>${p.s1.tens}</span> and <span class='text-red-500 font-bold'>${p.s1.ones}</span>.`,
          `Next, <span class='text-green-600 font-bold'>${p.num2}</span> is <span class='text-blue-500 font-bold'>${p.s2.tens}</span> and <span class='text-red-500 font-bold'>${p.s2.ones}</span>.`,
          `First, add the Tens: <span class='text-blue-600 font-bold'>${p.s1.tens} + ${p.s2.tens} = ${tensSum}</span>.`,
          `Next, add the Ones: <span class='text-red-600 font-bold'>${p.s1.ones} + ${p.s2.ones} = ${onesSum}</span>.`,
          `Finally, join them: <span class='text-green-600 font-bold'>${tensSum} + ${onesSum} = ${total}</span>.`,
          "",
        ];

        if (state.step < 6) {
          area.innerHTML = `<div class="flex flex-col items-center fade-slide-in">
                    <p class="text-2xl font-semibold text-gray-600 text-center mb-6 leading-tight">${steps[state.step]}</p>
                    <button onclick="nextLearnStep()" class="next-btn">NEXT</button>
                </div>`;
        } else {
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in">
                    <div class="text-3xl font-black text-gray-500 mb-6 text-center uppercase tracking-widest">Lesson Complete</div>
                    <button onclick="startLearn()" class="w-full py-5 bg-green-500 text-white rounded-[2rem] font-black text-3xl shadow-xl mt-2 hover:scale-105 active:scale-95 transition-all">ANOTHER EXAMPLE</button>
                </div>`;
        }
      }

      function renderPracticeGame(area, tree, p) {
        renderTree(tree, p);

        if (state.step === 0 || state.step === 1)
          area.innerHTML = renderDecomp();
        else if (state.step < 5) area.innerHTML = renderSolve(p);
        else {
          document.getElementById("game-card").classList.add("finished");
          area.innerHTML = `<div class="w-full flex flex-col items-center justify-center fade-in mt-0">
                    <div class="text-3xl font-black text-green-600 tracking-widest uppercase mb-4 drop-shadow-sm">Mission Accomplished!</div>
                    <button onclick="generateProblem()" class="w-full py-5 bg-green-500 text-white rounded-[2.5rem] font-black text-4xl shadow-xl hover:scale-105 active:scale-95 transition-all">NEXT MISSION</button>
                </div>`;
        }
      }

      function renderDecomp() {
        const p = state.currentProblem;
        if (!state.showOptions) {
          return `<div class="w-full fade-in flex flex-col items-center justify-center py-4">
                <div class="text-xl font-bold text-green-600 animate-bounce flex items-center gap-3 bg-green-50 px-6 py-3 rounded-full border-2 border-green-200 shadow-sm cursor-default">
                    👉 Choose any number by clicking above.
                </div>
            </div>`;
        }

        const opts = state.activeDecomp === 1 ? p.opts1 : p.opts2;

        return `<div class="w-full fade-in flex flex-col items-center mt-2">
                <div class="grid grid-cols-2 gap-4 w-full max-w-lg">
                    ${opts.map((o, i) => `<button id="opt-${i}" onclick="handleOptionClick(${i}, ${o.c}, 'opt-${i}')" class="option-btn p-4 bg-white border-2 border-green-100 rounded-[2rem] text-3xl font-black text-green-700 hover:border-green-300 active:scale-95 transition-all">${o.t}</button>`).join("")}
                </div>
            </div>`;
      }

      function renderSolve(p) {
        const tensSum = p.s1.tens + p.s2.tens;
        const onesSum = p.s1.ones + p.s2.ones;
        const total = p.num1 + p.num2;

        let correctVal, label, offsetType;
        if (state.step === 2) {
          correctVal = tensSum;
          label = p.isN2Zero ? "2. Add Tens" : "3. Add Tens";
          offsetType = "tens";
        } else if (state.step === 3) {
          correctVal = onesSum;
          label = "4. Add Ones";
          offsetType = "ones";
        } else if (state.step === 4) {
          correctVal = total;
          label = "Final Total";
          offsetType = "final";
        }

        const mcqs = generateMathOptions(correctVal, offsetType);
        let html = `<div class="w-full flex flex-col items-center fade-in mt-2">`;

        if (state.step === 4) {
          const displayLogic = p.isN2Zero
            ? `${tensSum} + ${p.s1.ones}`
            : `${tensSum} + ${onesSum}`;

          html += `<div class="w-full p-4 bg-yellow-50 rounded-[3rem] border-4 border-yellow-300 flex flex-col items-center shadow-md fade-in">
                    <span class="text-lg font-bold text-yellow-600 mb-2 uppercase tracking-widest">${label}</span>
                    <div class="text-4xl font-black text-yellow-600 mb-4">${displayLogic}</div>
                    <div class="grid grid-cols-2 gap-3 w-full max-w-md">
                        ${mcqs.map((m, i) => `<button id="final-mcq-${i}" onclick="handleStepChoice(${m.correct}, 'final-mcq-${i}')" class="option-btn p-3 bg-white border-2 border-yellow-100 rounded-[1.5rem] text-2xl font-black text-yellow-700 hover:border-yellow-300 active:scale-95 transition-all">${m.text}</button>`).join("")}
                    </div></div>`;
        } else {
          const colorClass = state.step === 2 ? "blue" : "red";
          const mathDisplay =
            state.step === 2
              ? `${p.s1.tens} + ${p.s2.tens}`
              : `${p.s1.ones} + ${p.s2.ones}`;

          html += `<div class="w-full p-4 bg-${colorClass}-50 rounded-[3rem] border-2 border-${colorClass}-100 flex flex-col items-center fade-in">
                    <span class="text-lg font-bold text-${colorClass}-500 mb-2 uppercase tracking-widest">${label}</span>
                    <div class="text-4xl font-black text-${colorClass}-600 mb-4">${mathDisplay}</div>
                    <div class="grid grid-cols-2 gap-3 w-full max-w-md">
                        ${mcqs.map((m, i) => `<button id="mcq-${i}" onclick="handleStepChoice(${m.correct}, 'mcq-${i}')" class="option-btn p-3 bg-white border-2 border-${colorClass}-100 rounded-[1.5rem] text-2xl font-black text-${colorClass}-700 hover:border-${colorClass}-300 active:scale-95 transition-all">${m.text}</button>`).join("")}
                    </div></div>`;
        }

        return html + `</div>`;
      }

      function triggerConfetti() {
        const cvs = document.getElementById("confetti-canvas"),
          ctx = cvs.getContext("2d");
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        const arr = [];
        for (let i = 0; i < 150; i++)
          arr.push({
            x: cvs.width / 2,
            y: cvs.height / 2,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 10,
            c: `hsl(${Math.random() * 360}, 70%, 50%)`,
            r: Math.random() * 8 + 4,
          });
        function anim() {
          ctx.clearRect(0, 0, cvs.width, cvs.height);
          arr.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.4;
            if (p.y > cvs.height) arr.splice(i, 1);
            ctx.fillStyle = p.c;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          });
          if (arr.length > 0) requestAnimationFrame(anim);
        }
        anim();
      }

      renderShell();
    </script>
  </body>
</html>
